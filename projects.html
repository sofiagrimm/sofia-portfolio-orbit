<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Sofia Grimm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100%;background:#060d18;font-family:'Inter',sans-serif;color:#e9f0ff;overflow-x:hidden;}
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .nebula{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 50% 35% at 20% 60%,rgba(30,70,170,.07) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 30%,rgba(20,80,190,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 44% at 50% 50%,rgba(15,35,110,.05) 0%,transparent 65%);}
    nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;}
    .nav-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;letter-spacing:.06em;color:rgba(220,232,255,.9);text-decoration:none;}
    .nav-links{display:flex;align-items:center;gap:4px;}
    .nav-links a{font-size:13px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;color:rgba(160,190,255,.5);text-decoration:none;padding:7px 16px;border-radius:4px;transition:color .25s,background .25s;}
    .nav-links a:hover,.nav-links a.active{color:rgba(220,235,255,.9);background:rgba(100,140,255,.08);}
    .nav-links .divider{color:rgba(100,130,200,.2);font-size:13px;user-select:none;}
    .page{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:110px 32px 100px;}
    .page-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(160,185,255,.45);margin-bottom:20px;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:300;line-height:1.08;color:#eef3ff;margin-bottom:14px;}
    .page-title em{font-style:italic;color:rgba(190,210,255,.85);}
    .page-subtitle{font-size:13px;font-weight:300;color:rgba(160,190,255,.40);letter-spacing:.06em;margin-bottom:36px;}
    .rule{width:48px;height:1px;background:linear-gradient(90deg,rgba(140,170,255,.4),transparent);margin-bottom:44px;}

    /* ═══════════════════════════════════════
       CARD FLIP SYSTEM
    ═══════════════════════════════════════ */
    .memory-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:18px;
    }
    .card-scene{
      aspect-ratio:3/4;
      perspective:900px;
      cursor:pointer;
    }
    .card-flipper{
      position:relative;
      width:100%;height:100%;
      transform-style:preserve-3d;
      transition:transform .55s cubic-bezier(.22,1,.36,1);
      border-radius:14px;
    }
    .card-scene.flipped .card-flipper{
      transform:rotateY(180deg);
    }
    .card-face{
      position:absolute;inset:0;
      border-radius:14px;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      overflow:hidden;
    }

    /* ── BACK FACE ── */
    .card-back{
      background:#0a1230;
      border:1px solid rgba(130,155,255,.18);
      display:flex;align-items:center;justify-content:center;
      transition:box-shadow .22s;
    }
    .card-scene:not(.flipped):hover .card-back{
      box-shadow:0 10px 36px rgba(100,130,255,.22);
      border-color:rgba(160,185,255,.32);
    }
    .card-back svg{
      width:100%;height:100%;
      position:absolute;inset:0;
    }

    /* ── Card back animations ── */
    @keyframes shimmerSweep {
      0%   { transform: translateX(-100%) rotate(25deg); opacity:0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateX(200%) rotate(25deg); opacity:0; }
    }
    @keyframes suitPulse {
      0%,100% { opacity:0.55; transform: scale(1); }
      50%      { opacity:0.78; transform: scale(1.06); }
    }
    @keyframes cornerTwinkle {
      0%,100% { opacity:0.55; }
      40%      { opacity:0.90; }
      60%      { opacity:0.35; }
    }
    @keyframes borderGlow {
      0%,100% { stroke-opacity:0.22; }
      50%      { stroke-opacity:0.55; }
    }
    @keyframes particleDrift {
      0%   { transform: translateY(0)   translateX(0)   scale(1);   opacity:0.7; }
      33%  { transform: translateY(-6px) translateX(4px) scale(1.3); opacity:1;   }
      66%  { transform: translateY(4px) translateX(-3px) scale(0.8); opacity:0.5; }
      100% { transform: translateY(0)   translateX(0)   scale(1);   opacity:0.7; }
    }
    @keyframes frameRotate {
      0%   { transform:rotate(0deg);   }
      100% { transform:rotate(360deg); }
    }

    /* Apply to SVG children via .card-back class helpers */
    .card-back .cb-shimmer{
      position:absolute;
      top:0;left:0;
      width:30%;height:100%;
      background:linear-gradient(90deg,transparent 0%,rgba(200,215,255,0.09) 50%,transparent 100%);
      animation: shimmerSweep 4s ease-in-out infinite;
      pointer-events:none;
      z-index:2;
    }
    .card-back .cb-suit-anim{ animation: suitPulse 3s ease-in-out infinite; transform-origin:50% 50%; }
    .card-back .cb-corner-anim{ animation: cornerTwinkle 2.5s ease-in-out infinite; }
    .card-back .cb-border-anim{ animation: borderGlow 3.5s ease-in-out infinite; }
    .card-back .cb-particle{ animation: particleDrift 3s ease-in-out infinite; transform-origin:50% 50%; }
    /* stagger particles per card — set via inline style animation-delay */

    /* ── FRONT FACE ── */
    .card-front{
      background:rgba(6,14,44,.92);
      border:1px solid rgba(120,150,240,.18);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      transform:rotateY(180deg);
      padding:20px 18px 16px;
      display:flex;flex-direction:column;gap:8px;
      box-shadow:0 16px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(200,210,255,.05);
    }
    .fr-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(140,175,255,.5);}
    .fr-date{font-size:9px;letter-spacing:.1em;color:rgba(120,150,210,.32);margin-top:1px;}
    .fr-rule{width:28px;height:1px;background:linear-gradient(90deg,rgba(150,170,255,.3),transparent);margin:2px 0;}
    .fr-title{font-family:'Cormorant Garamond',serif;font-size:clamp(13px,1.5vw,18px);font-weight:300;line-height:1.2;color:#ddeeff;}
    .fr-body{font-size:10px;font-weight:300;line-height:1.65;color:rgba(190,210,255,.52);flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:7;-webkit-box-orient:vertical;}
    .fr-link{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(150,185,255,.55);text-decoration:none;border-bottom:1px solid rgba(140,180,255,.15);align-self:flex-start;margin-top:auto;transition:color .2s;}
    .fr-link:hover{color:rgba(210,225,255,.9);}
    .coords{position:fixed;bottom:32px;left:48px;z-index:20;font-size:10px;letter-spacing:.18em;color:rgba(110,130,190,.28);font-weight:300;pointer-events:none;}
  </style>
</head>
<body>
  <div class="nebula"></div>
  <nav>
    <a class="nav-name" href="index.html">Sofia Grimm</a>
    <div class="nav-links">
      <a href="index.html">Home</a><span class="divider">|</span>
      <a href="about.html">About</a><span class="divider">|</span>
      <a href="research.html">Research</a><span class="divider">|</span>
      <a href="projects.html" class="active">Projects</a>
    </div>
  </nav>
  <main class="page">
    <div class="page-eyebrow">Projects</div>
    <h1 class="page-title">Things I've <em>built.</em></h1>
    <p class="page-subtitle">Click any card to reveal.</p>
    <div class="rule"></div>
    <div class="memory-grid" id="memoryGrid"></div>
  </main>
  <div class="coords">41.3083&deg; N &nbsp; 72.9279&deg; W</div>

  <script>
    const PROJECTS = [
      { tag:"Startup · MedTech", date:"Mar 2026 – Present", title:"PCDD — Patient Controlled Dispenser & Deactivator", body:"Developing business strategy for a patent-pending medication disposal device at Yale School of Engineering under Dr. Wiznia. Work spans ingress mechanisms, activated charcoal deactivation protocols, and go-to-market planning.", link:"#", linkLabel:"In progress →" },
      { tag:"Hackathon · Best Solo Hack", date:"2026", title:"YHack 2026 — Best Solo Hack", body:"Won Best Solo Hack at YHack 2026, Yale's annual hackathon. Built and shipped a complete project independently under time constraints.", link:"#", linkLabel:"Details coming →" },
      { tag:"Healthcare · Consulting", date:"Jan 2026 – Present", title:"Decision Support Tool — American Red Cross", body:"Configuring a decision support tool for the American Red Cross to assist in annual resource planning. Benchmarks required vehicle counts against live inventory, quantifying regional surplus to inform fleet allocation.", link:"#", linkLabel:"In progress →" },
      { tag:"Strategy · Consulting", date:"Feb 2026 – Present", title:"ASEAN Market Expansion Strategy", body:"Advising a Malaysian non-profit on expansion across ASEAN markets. Developing a market readiness framework and analyzing regional youth ecosystems to prioritize pilot launch markets.", link:"#", linkLabel:"In progress →" },
      { tag:"ML · Astrophysics", date:"2023", title:"Gravitational Lens CNN Classifier — Fermilab", body:"Generated two 40,000-image benchmark datasets of double-source plane lenses and Einstein rings at Fermi National Accelerator Laboratory. Trained CNNs (PyTorch) for automated morphological classification. Published at AGU Annual Meeting.", link:"https://agu.confex.com/agu/fm23/meetingapp.cgi/Paper/1438256", linkLabel:"View publication →" },
      { tag:"Operations Research · Policy", date:"2022 – 2023", title:"Green Vehicle Routing — CCIR", body:"Used a mixed-integer linear programming framework to optimize transportation routes for the Green Vehicle problem through the Cambridge Center for International Research Future Scholar Program.", link:"#", linkLabel:"CCIR Spotlight Scholar →" },
      { tag:"Web · 3D Design", date:"2026", title:"This Portfolio", body:"An interactive 3D orbital homepage built with Three.js — twinkling constellations, self-rotating ringed planets, and a frosted-glass centre card. Designed and iterated entirely from scratch.", link:"index.html", linkLabel:"View live →" },
      { tag:"Finance · Investing", date:"2022 – 2025", title:"Latin School Investment Fund", body:"Board member managing a $100,000 student-run stock portfolio as one of eleven voting members. Gave weekly portfolio stock reports and pitched new investments to the Board.", link:"#", linkLabel:"Details →" }
    ];

    const SUITS = ['♠','♥','♦','♣'];
    const SUIT_COLORS = [
      'rgba(180,195,255,0.75)',
      'rgba(255,140,160,0.75)',
      'rgba(255,160,120,0.75)',
      'rgba(160,220,180,0.75)',
    ];
    const RANKS = ['I','II','III','IV','V','VI','VII','VIII'];

    const flippedSet = new Set();

    function makeCardBackSVG(index) {
      const suit = SUITS[index % 4];
      const sc   = SUIT_COLORS[index % 4];
      const rank = RANKS[index];
      const delay = (index * 0.42).toFixed(2);
      const pDelay = (d) => (index * 0.31 + d).toFixed(2);

      return `<svg viewBox="0 0 180 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <defs>
          <pattern id="grid${index}" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <path d="M18 0L0 0 0 18" fill="none" stroke="rgba(140,165,255,0.07)" stroke-width="0.6"/>
          </pattern>
          <radialGradient id="vg${index}" cx="50%" cy="50%" r="72%">
            <stop offset="0%" stop-color="rgba(30,50,120,0)"/>
            <stop offset="100%" stop-color="rgba(4,8,30,0.55)"/>
          </radialGradient>
          <radialGradient id="cg${index}" cx="50%" cy="50%" r="55%">
            <stop offset="0%" stop-color="rgba(100,130,255,0.06)"/>
            <stop offset="100%" stop-color="rgba(20,40,110,0)"/>
          </radialGradient>
          <filter id="glow${index}">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Base -->
        <rect width="180" height="240" fill="#0a1230"/>
        <rect width="180" height="240" fill="url(#grid${index})"/>
        <rect width="180" height="240" fill="url(#cg${index})"/>

        <!-- Animated outer border -->
        <rect x="7" y="7" width="166" height="226" rx="10" ry="10" fill="none"
              stroke="${sc}" stroke-width="1" stroke-opacity="0.22"
              style="animation:borderGlow 3.5s ease-in-out ${delay}s infinite"/>
        <rect x="11" y="11" width="158" height="218" rx="8" ry="8"
              fill="none" stroke="rgba(140,165,255,0.10)" stroke-width="0.6"/>

        <!-- Spinning diamond ornament (top-center) -->
        <g transform="translate(90,30)" style="animation:frameRotate 12s linear ${delay}s infinite;transform-box:fill-box;transform-origin:50% 50%;">
          <rect x="-5" y="-5" width="10" height="10" rx="1"
                fill="none" stroke="${sc}" stroke-width="0.8" stroke-opacity="0.5"
                transform="rotate(45)"/>
        </g>
        <!-- Spinning diamond ornament (bottom-center) -->
        <g transform="translate(90,210)" style="animation:frameRotate 12s linear ${delay}s infinite reverse;transform-box:fill-box;transform-origin:50% 50%;">
          <rect x="-5" y="-5" width="10" height="10" rx="1"
                fill="none" stroke="${sc}" stroke-width="0.8" stroke-opacity="0.5"
                transform="rotate(45)"/>
        </g>

        <!-- Corner labels with twinkle -->
        <g style="animation:cornerTwinkle 2.5s ease-in-out ${delay}s infinite">
          <text x="15" y="28" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text>
          <text x="15" y="42" font-family="Georgia,serif" font-size="9"  text-anchor="middle" fill="rgba(180,200,255,0.45)">${rank}</text>
          <text x="165" y="28" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text>
          <text x="165" y="42" font-family="Georgia,serif" font-size="9"  text-anchor="middle" fill="rgba(180,200,255,0.45)">${rank}</text>
          <g transform="rotate(180,90,120)">
            <text x="-75" y="-92" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text>
            <text x="-75" y="-78" font-family="Georgia,serif" font-size="9"  text-anchor="middle" fill="rgba(180,200,255,0.45)">${rank}</text>
          </g>
          <g transform="rotate(180,90,120)">
            <text x="75" y="-92" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text>
            <text x="75" y="-78" font-family="Georgia,serif" font-size="9"  text-anchor="middle" fill="rgba(180,200,255,0.45)">${rank}</text>
          </g>
        </g>

        <!-- Inner frame -->
        <rect x="32" y="52" width="116" height="136" rx="5" ry="5"
              fill="rgba(20,35,100,0.25)" stroke="rgba(140,165,255,0.14)" stroke-width="0.8"/>

        <!-- Inner cross lines -->
        <line x1="32" y1="120" x2="148" y2="120" stroke="rgba(140,165,255,0.06)" stroke-width="0.7"/>
        <line x1="90" y1="52"  x2="90"  y2="188" stroke="rgba(140,165,255,0.06)" stroke-width="0.7"/>

        <!-- Corner pips inside frame -->
        <g fill="${sc}" opacity="0.40" font-family="Georgia,serif" font-size="11" text-anchor="middle">
          <text x="50" y="76">${suit}</text>
          <text x="130" y="76">${suit}</text>
          <text x="50" y="183">${suit}</text>
          <text x="130" y="183">${suit}</text>
        </g>

        <!-- Central suit — pulsing + glow -->
        <text x="90" y="136" font-family="Georgia,serif" font-size="52" text-anchor="middle" dominant-baseline="middle"
              fill="${sc}" filter="url(#glow${index})"
              style="animation:suitPulse 3s ease-in-out ${delay}s infinite;transform-box:fill-box;transform-origin:50% 50%;">${suit}</text>

        <!-- Monogram overlay -->
        <text x="90" y="136" font-family="Georgia,serif" font-style="italic" font-size="18" text-anchor="middle" dominant-baseline="middle"
              fill="rgba(210,220,255,0.18)">SG</text>

        <!-- Decorative rules -->
        <line x1="40" y1="60"  x2="140" y2="60"  stroke="rgba(160,175,255,0.12)" stroke-width="0.6"/>
        <line x1="40" y1="180" x2="140" y2="180" stroke="rgba(160,175,255,0.12)" stroke-width="0.6"/>

        <!-- Dot ornaments mid-frame -->
        <circle cx="34" cy="120" r="2" fill="${sc}" opacity="0.28"
                style="animation:cornerTwinkle 2s ease-in-out ${pDelay(0.3)}s infinite"/>
        <circle cx="146" cy="120" r="2" fill="${sc}" opacity="0.28"
                style="animation:cornerTwinkle 2s ease-in-out ${pDelay(0.7)}s infinite"/>

        <!-- Floating micro-particles -->
        <circle cx="60"  cy="90"  r="1.2" fill="${sc}" opacity="0.5" style="animation:particleDrift 3.1s ease-in-out ${pDelay(0.0)}s infinite"/>
        <circle cx="120" cy="100" r="1.0" fill="${sc}" opacity="0.4" style="animation:particleDrift 3.7s ease-in-out ${pDelay(0.5)}s infinite"/>
        <circle cx="75"  cy="155" r="1.3" fill="${sc}" opacity="0.45" style="animation:particleDrift 2.8s ease-in-out ${pDelay(1.1)}s infinite"/>
        <circle cx="115" cy="145" r="1.0" fill="${sc}" opacity="0.35" style="animation:particleDrift 4.2s ease-in-out ${pDelay(0.8)}s infinite"/>
        <circle cx="90"  cy="75"  r="0.9" fill="rgba(220,230,255,0.6)" style="animation:particleDrift 3.4s ease-in-out ${pDelay(1.4)}s infinite"/>

        <!-- Vignette -->
        <rect width="180" height="240" fill="url(#vg${index})" rx="12"/>

        <!-- Card number -->
        <text x="166" y="233" font-family="'Inter',sans-serif" font-size="7" text-anchor="end"
              fill="rgba(140,165,255,0.20)" letter-spacing="1">${String(index+1).padStart(2,'0')}</text>
      </svg>`;
    }

    const grid = document.getElementById('memoryGrid');
    PROJECTS.forEach((p, i) => {
      const scene = document.createElement('div');
      scene.className = 'card-scene';
      const flipper = document.createElement('div');
      flipper.className = 'card-flipper';

      const back = document.createElement('div');
      back.className = 'card-face card-back';
      back.innerHTML = makeCardBackSVG(i);
      // Shimmer overlay
      const shimmer = document.createElement('div');
      shimmer.className = 'cb-shimmer';
      shimmer.style.animationDelay = (i * 0.6) + 's';
      back.appendChild(shimmer);

      const front = document.createElement('div');
      front.className = 'card-face card-front';
      const linkAttr = (p.link && p.link !== '#') ? `href="${p.link}" target="_blank" rel="noopener"` : `href="${p.link}"`;
      front.innerHTML = `
        <span class="fr-tag">${p.tag}</span>
        <span class="fr-date">${p.date}</span>
        <div class="fr-rule"></div>
        <div class="fr-title">${p.title}</div>
        <div class="fr-body">${p.body}</div>
        <a class="fr-link" ${linkAttr}>${p.linkLabel}</a>
      `;

      flipper.appendChild(back);
      flipper.appendChild(front);
      scene.appendChild(flipper);
      grid.appendChild(scene);

      if (flippedSet.has(i)) scene.classList.add('flipped');

      scene.addEventListener('click', () => {
        if (!scene.classList.contains('flipped')) {
          scene.classList.add('flipped');
          flippedSet.add(i);
        }
      });
    });
  </script>

  <script type="module">
    import('https://unpkg.com/three@0.161.0/build/three.module.js').then(THREE=>{
      const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(window.innerWidth,window.innerHeight);
      renderer.setClearColor(0x060d18,1);
      document.body.appendChild(renderer.domElement);
      const scene=new THREE.Scene();
      const camera=new THREE.PerspectiveCamera(36,window.innerWidth/window.innerHeight,.1,500);
      camera.position.set(0,0,46);camera.lookAt(0,0,0);
      window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
      const N=7000,pos=new Float32Array(N*3),ph=new Float32Array(N),sp=new Float32Array(N),sz=new Float32Array(N);
      for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*220;pos[i*3+1]=(Math.random()-.5)*160;pos[i*3+2]=-Math.random()*260;ph[i]=Math.random()*Math.PI*2;sp[i]=.002+Math.random()*.005;sz[i]=.1+Math.random()*.2;}
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      geo.setAttribute('phase',new THREE.BufferAttribute(ph,1));
      geo.setAttribute('speed',new THREE.BufferAttribute(sp,1));
      geo.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
      const mat=new THREE.ShaderMaterial({uniforms:{time:{value:0}},vertexShader:`attribute float aSize;attribute float phase;attribute float speed;uniform float time;varying float vB;void main(){float r=abs(sin(time*speed+phase));vB=.7+.3*pow(r,.3);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(1.+2.*max(0.,r-.75)/.25)*(300./-mv.z);gl_Position=projectionMatrix*mv;}`,fragmentShader:`varying float vB;void main(){vec2 uv=gl_PointCoord-vec2(.5);if(length(uv)>.5)discard;float c=1.-smoothstep(0.,.45,length(uv));gl_FragColor=vec4(vec3(.75,.88,1.)*vB,c*vB);}`,transparent:true,depthWrite:false});
      scene.add(new THREE.Points(geo,mat));
      (function loop(t){requestAnimationFrame(loop);mat.uniforms.time.value=t*.001;renderer.render(scene,camera);})(0);
    });
  </script>
</body>
</html>
