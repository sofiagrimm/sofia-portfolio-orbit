<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Sofia Grimm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100%;background:#060d18;font-family:'Inter',sans-serif;color:#e9f0ff;overflow-x:hidden;}
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .nebula{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 50% 35% at 20% 60%,rgba(30,70,170,.07) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 30%,rgba(20,80,190,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 44% at 50% 50%,rgba(15,35,110,.05) 0%,transparent 65%);}
    nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;}
    .nav-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;letter-spacing:.06em;color:rgba(220,232,255,.9);text-decoration:none;}
    .nav-links{display:flex;align-items:center;gap:4px;}
    .nav-links a{font-size:13px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;color:rgba(160,190,255,.5);text-decoration:none;padding:7px 16px;border-radius:4px;transition:color .25s,background .25s;}
    .nav-links a:hover,.nav-links a.active{color:rgba(220,235,255,.9);background:rgba(100,140,255,.08);}
    .nav-links .divider{color:rgba(100,130,200,.2);font-size:13px;user-select:none;}
    .page{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:110px 32px 100px;}
    .page-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(160,185,255,.45);margin-bottom:20px;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:300;line-height:1.08;color:#eef3ff;margin-bottom:14px;}
    .page-title em{font-style:italic;color:rgba(190,210,255,.85);}
    .page-subtitle{font-size:13px;font-weight:300;color:rgba(160,190,255,.40);letter-spacing:.06em;margin-bottom:36px;}
    .rule{width:48px;height:1px;background:linear-gradient(90deg,rgba(140,170,255,.4),transparent);margin-bottom:44px;}

    /* ═══ GRID ═══ */
    .memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}

    /* ═══ CARD SCENE ═══ */
    @keyframes cardEntrance {
      0%   { opacity:0; transform:translateY(28px) scale(0.93); }
      100% { opacity:1; transform:translateY(0)    scale(1); }
    }
    @keyframes idleFloat {
      0%,100% { transform:translateY(0px); }
      50%      { transform:translateY(-5px); }
    }
    .card-scene{
      aspect-ratio:3/4;
      perspective:900px;
      cursor:pointer;
      opacity:0;
      animation:cardEntrance .6s cubic-bezier(.22,1,.36,1) forwards;
    }
    .card-scene.floating{
      animation:idleFloat 4.5s ease-in-out infinite;
    }
    .card-scene.revealed{
      cursor:default;
    }

    /* ═══ FLIPPER ═══ */
    .card-flipper{
      position:relative;
      width:100%;height:100%;
      transform-style:preserve-3d;
      transition:transform .65s cubic-bezier(.22,1,.36,1);
      border-radius:14px;
      will-change:transform;
    }
    .card-scene.flipped .card-flipper{ transform:rotateY(180deg); }

    .card-face{
      position:absolute;inset:0;
      border-radius:14px;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      overflow:hidden;
    }

    /* ═══ BACK FACE ═══ */
    .card-back{
      background:#0a1230;
      border:1px solid rgba(130,155,255,.18);
      display:flex;align-items:center;justify-content:center;
      transition:box-shadow .22s, border-color .22s;
    }
    .card-scene:not(.flipped):not(.revealed):hover .card-back{
      box-shadow:0 14px 44px rgba(100,130,255,.30), 0 0 0 1px rgba(160,185,255,.20);
      border-color:rgba(160,185,255,.38);
    }
    .card-back svg{width:100%;height:100%;position:absolute;inset:0;}

    @keyframes shimmerSweep {
      0%   { transform:translateX(-120%) rotate(22deg); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:1; }
      100% { transform:translateX(220%) rotate(22deg); opacity:0; }
    }
    .card-back .cb-shimmer{
      position:absolute;top:0;left:0;
      width:28%;height:100%;
      background:linear-gradient(90deg,transparent 0%,rgba(200,215,255,0.11) 50%,transparent 100%);
      animation:shimmerSweep 4.2s ease-in-out infinite;
      pointer-events:none;z-index:2;
    }
    @keyframes auroraWash {
      0%   { background-position:0% 50%;   opacity:0.07; }
      50%  { background-position:100% 50%; opacity:0.13; }
      100% { background-position:0% 50%;   opacity:0.07; }
    }
    .card-back .cb-aurora{
      position:absolute;inset:0;border-radius:14px;
      background:linear-gradient(120deg,rgba(100,130,255,0),rgba(160,100,255,0.2),rgba(80,180,255,0.15),rgba(100,130,255,0));
      background-size:300% 300%;
      animation:auroraWash 6s ease-in-out infinite;
      pointer-events:none;z-index:1;
    }
    @keyframes burstRing {
      0%   { transform:scale(0.5); opacity:0.7; }
      100% { transform:scale(2.2); opacity:0;   }
    }
    .card-back .cb-burst{
      position:absolute;
      width:60%;padding-top:60%;
      top:50%;left:50%;
      margin-top:-30%;margin-left:-30%;
      border-radius:50%;
      border:1.5px solid rgba(180,200,255,0.6);
      pointer-events:none;z-index:3;
      opacity:0;
    }
    .bursting .cb-burst{
      animation:burstRing .55s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes suitPulse    { 0%,100%{opacity:.55;transform:scale(1);}     50%{opacity:.82;transform:scale(1.08);} }
    @keyframes cornerTwinkle{ 0%,100%{opacity:.55;} 35%{opacity:.92;} 65%{opacity:.30;} }
    @keyframes borderGlow   { 0%,100%{stroke-opacity:.20;} 50%{stroke-opacity:.58;} }
    @keyframes particleDrift{ 0%{transform:translateY(0) translateX(0) scale(1);opacity:.65;} 33%{transform:translateY(-7px) translateX(4px) scale(1.4);opacity:1;} 66%{transform:translateY(5px) translateX(-4px) scale(.7);opacity:.45;} 100%{transform:translateY(0) translateX(0) scale(1);opacity:.65;} }
    @keyframes frameRotate  { to{transform:rotate(360deg);} }
    @keyframes orbitRing    { from{transform:rotate(0deg);}   to{transform:rotate(360deg);}  }
    @keyframes orbitRingRev { from{transform:rotate(0deg);}   to{transform:rotate(-360deg);} }

    /* ═══ FRONT FACE ═══ */
    .card-front{
      background:rgba(6,14,44,.92);
      border:1px solid rgba(120,150,240,.18);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      transform:rotateY(180deg);
      padding:20px 18px 16px;
      display:flex;flex-direction:column;gap:8px;
      box-shadow:0 16px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(200,210,255,.05);
    }
    .fr-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(140,175,255,.5);}
    .fr-date{font-size:9px;letter-spacing:.1em;color:rgba(120,150,210,.32);margin-top:1px;}
    .fr-rule{width:28px;height:1px;background:linear-gradient(90deg,rgba(150,170,255,.3),transparent);margin:2px 0;}
    .fr-title{font-family:'Cormorant Garamond',serif;font-size:clamp(13px,1.5vw,18px);font-weight:300;line-height:1.2;color:#ddeeff;}
    .fr-body{font-size:10px;font-weight:300;line-height:1.65;color:rgba(190,210,255,.52);flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;}
    .fr-link{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(150,185,255,.55);text-decoration:none;border-bottom:1px solid rgba(140,180,255,.15);align-self:flex-start;transition:color .2s;}
    .fr-link:hover{color:rgba(210,225,255,.9);}

    /* ═══ POPUP OVERLAY ═══ */
    #cardPopupOverlay{
      position:fixed;inset:0;z-index:100;
      background:rgba(4,8,28,0);
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;
      transition:background .35s ease;
    }
    #cardPopupOverlay.visible{
      background:rgba(4,8,28,0.72);
      pointer-events:auto;
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
    }

    /* ═══ POPUP CARD WRAPPER ═══ */
    #cardPopupInner{
      position:relative;
      width:min(320px,78vw);
      aspect-ratio:3/4;
      perspective:900px;
      opacity:0;
      transform:scale(0.45) translateY(30px);
      filter:blur(6px);
      transition:
        opacity   .50s cubic-bezier(.22,1,.36,1),
        transform .50s cubic-bezier(.22,1,.36,1),
        filter    .50s cubic-bezier(.22,1,.36,1);
    }
    #cardPopupOverlay.visible #cardPopupInner{
      opacity:1;
      transform:scale(1) translateY(0);
      filter:blur(0px);
    }
    #cardPopupInner.dismissing{
      opacity:0;
      transform:scale(0.45) translateY(30px);
      filter:blur(6px);
      transition:
        opacity   .36s cubic-bezier(.55,0,.45,1),
        transform .36s cubic-bezier(.55,0,.45,1),
        filter    .36s cubic-bezier(.55,0,.45,1);
    }

    #cardPopupClose{
      position:absolute;
      top:-16px;right:-16px;
      width:36px;height:36px;
      background:rgba(12,22,80,0.90);
      border:1px solid rgba(150,175,255,0.35);
      border-radius:50%;
      color:rgba(210,225,255,0.90);
      font-size:14px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;z-index:10;
      transition:background .18s,color .18s,transform .18s,box-shadow .18s;
      backdrop-filter:blur(10px);
      box-shadow:0 4px 20px rgba(0,0,0,.5);
    }
    #cardPopupClose:hover{
      background:rgba(80,100,220,0.60);
      color:#fff;
      transform:scale(1.15) rotate(90deg);
      box-shadow:0 6px 28px rgba(80,120,255,.4);
    }

    #cardPopupFlipper{
      width:100%;height:100%;
      transform-style:preserve-3d;
      transition:transform .65s cubic-bezier(.22,1,.36,1);
      border-radius:14px;
      will-change:transform;
    }
    #cardPopupFlipper.flipped{ transform:rotateY(180deg); }

    .coords{position:fixed;bottom:32px;left:48px;z-index:20;font-size:10px;letter-spacing:.18em;color:rgba(110,130,190,.28);font-weight:300;pointer-events:none;}
  </style>
</head>
<body>
  <div class="nebula"></div>
  <nav>
    <a class="nav-name" href="index.html">Sofia Grimm</a>
    <div class="nav-links">
      <a href="index.html">Home</a><span class="divider">|</span>
      <a href="about.html">About</a><span class="divider">|</span>
      <a href="research.html">Research</a><span class="divider">|</span>
      <a href="projects.html" class="active">Projects</a>
    </div>
  </nav>
  <main class="page">
    <div class="page-eyebrow">Projects</div>
    <h1 class="page-title">Things I've <em>built.</em></h1>
    <p class="page-subtitle">Click any card to reveal it.</p>
    <div class="rule"></div>
    <div class="memory-grid" id="memoryGrid"></div>
  </main>
  <div class="coords">41.3083&deg; N &nbsp; 72.9279&deg; W</div>

  <!-- Card popup overlay -->
  <div id="cardPopupOverlay">
    <div id="cardPopupInner">
      <button id="cardPopupClose" aria-label="Close card">&#x2715;</button>
      <div id="cardPopupFlipper"></div>
    </div>
  </div>

  <script>
    const PROJECTS = [
      { tag:"Startup · MedTech", date:"Mar 2026 – Present", title:"PCDD — Patient Controlled Dispenser & Deactivator", body:"Developing business strategy for a patent-pending medication disposal device at Yale School of Engineering under Dr. Wiznia. Work spans ingress mechanisms, activated charcoal deactivation protocols, and go-to-market planning.", link:"#", linkLabel:"In progress →" },
      { tag:"Hackathon · Best Solo Hack", date:"2026", title:"YHack 2026 — Best Solo Hack", body:"Won Best Solo Hack at YHack 2026, Yale's annual hackathon. Built and shipped a complete project independently under time constraints.", link:"#", linkLabel:"Details coming →" },
      { tag:"Healthcare · Consulting", date:"Jan 2026 – Present", title:"Decision Support Tool — American Red Cross", body:"Configuring a decision support tool for the American Red Cross to assist in annual resource planning. Benchmarks required vehicle counts against live inventory, quantifying regional surplus to inform fleet allocation.", link:"#", linkLabel:"In progress →" },
      { tag:"Strategy · Consulting", date:"Feb 2026 – Present", title:"ASEAN Market Expansion Strategy", body:"Advising a Malaysian non-profit on expansion across ASEAN markets. Developing a market readiness framework and analyzing regional youth ecosystems to prioritize pilot launch markets.", link:"#", linkLabel:"In progress →" },
      { tag:"ML · Astrophysics", date:"2023", title:"Gravitational Lens CNN Classifier — Fermilab", body:"Generated two 40,000-image benchmark datasets of double-source plane lenses and Einstein rings at Fermi National Accelerator Laboratory. Trained CNNs (PyTorch) for automated morphological classification. Published at AGU Annual Meeting.", link:"https://agu.confex.com/agu/fm23/meetingapp.cgi/Paper/1438256", linkLabel:"View publication →" },
      { tag:"Operations Research · Policy", date:"2022 – 2023", title:"Green Vehicle Routing — CCIR", body:"Used a mixed-integer linear programming framework to optimize transportation routes for the Green Vehicle problem through the Cambridge Center for International Research Future Scholar Program.", link:"#", linkLabel:"CCIR Spotlight Scholar →" },
      { tag:"Web · 3D Design", date:"2026", title:"This Portfolio", body:"An interactive 3D orbital homepage built with Three.js — twinkling constellations, self-rotating ringed planets, and a frosted-glass centre card. Designed and iterated entirely from scratch.", link:"index.html", linkLabel:"View live →" },
      { tag:"Finance · Investing", date:"2022 – 2025", title:"Latin School Investment Fund", body:"Board member managing a $100,000 student-run stock portfolio as one of eleven voting members. Gave weekly portfolio stock reports and pitched new investments to the Board.", link:"#", linkLabel:"Details →" }
    ];

    const SUITS       = ['♠','♥','♦','♣'];
    const SUIT_COLORS = ['rgba(180,195,255,0.80)','rgba(255,140,160,0.80)','rgba(255,170,110,0.80)','rgba(140,225,175,0.80)'];
    const RANKS       = ['I','II','III','IV','V','VI','VII','VIII'];

    // Each row gets a different shuffle of the 4 suits so no column repeats across rows.
    // Row 0 (cards 0-3): ♠ ♥ ♦ ♣  →  indices [0,1,2,3]
    // Row 1 (cards 4-7): ♣ ♦ ♠ ♥  →  indices [3,2,0,1]
    const ROW_SUITS = [
      [0,1,2,3],
      [3,2,0,1]
    ];

    function getSuitIdx(cardIdx) {
      const row = Math.floor(cardIdx / 4);
      const col = cardIdx % 4;
      return ROW_SUITS[row % ROW_SUITS.length][col];
    }

    function makeCardBackSVG(idx) {
      const si=getSuitIdx(idx),suit=SUITS[si],sc=SUIT_COLORS[si],rank=RANKS[idx];
      const d=(idx*0.42).toFixed(2),pd=x=>(idx*0.31+x).toFixed(2);
      return `<svg viewBox="0 0 180 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <defs>
          <pattern id="g${idx}" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path d="M18 0L0 0 0 18" fill="none" stroke="rgba(140,165,255,0.07)" stroke-width="0.6"/></pattern>
          <radialGradient id="vg${idx}" cx="50%" cy="50%" r="72%"><stop offset="0%" stop-color="rgba(30,50,120,0)"/><stop offset="100%" stop-color="rgba(4,8,30,0.55)"/></radialGradient>
          <radialGradient id="cg${idx}" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="rgba(100,130,255,0.07)"/><stop offset="100%" stop-color="rgba(20,40,110,0)"/></radialGradient>
          <filter id="glow${idx}" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="180" height="240" fill="#0a1230"/>
        <rect width="180" height="240" fill="url(#g${idx})"/>
        <rect width="180" height="240" fill="url(#cg${idx})"/>
        <rect x="7" y="7" width="166" height="226" rx="10" fill="none" stroke="${sc}" stroke-width="1.1" stroke-opacity="0.22" style="animation:borderGlow 3.5s ease-in-out ${d}s infinite"/>
        <rect x="11" y="11" width="158" height="218" rx="8" fill="none" stroke="rgba(140,165,255,0.09)" stroke-width="0.5"/>
        <g transform="translate(90,30)" style="animation:frameRotate 10s linear ${d}s infinite;transform-box:fill-box;transform-origin:50% 50%;"><rect x="-5" y="-5" width="10" height="10" rx="1" fill="none" stroke="${sc}" stroke-width="0.9" stroke-opacity="0.55" transform="rotate(45)"/></g>
        <g transform="translate(90,210)" style="animation:frameRotate 10s linear ${d}s infinite reverse;transform-box:fill-box;transform-origin:50% 50%;"><rect x="-5" y="-5" width="10" height="10" rx="1" fill="none" stroke="${sc}" stroke-width="0.9" stroke-opacity="0.55" transform="rotate(45)"/></g>
        <g style="animation:cornerTwinkle 2.5s ease-in-out ${d}s infinite">
          <text x="15" y="28" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text>
          <text x="165" y="28" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text>
          <g transform="rotate(180,90,120)"><text x="-75" y="-93" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text></g>
          <g transform="rotate(180,90,120)"><text x="75" y="-93" font-family="Georgia,serif" font-size="13" text-anchor="middle" fill="${sc}">${suit}</text></g>
        </g>
        <rect x="32" y="52" width="116" height="136" rx="5" fill="rgba(20,35,100,0.22)" stroke="rgba(140,165,255,0.13)" stroke-width="0.8"/>
        <line x1="32" y1="120" x2="148" y2="120" stroke="rgba(140,165,255,0.05)" stroke-width="0.7"/>
        <line x1="90" y1="52" x2="90" y2="188" stroke="rgba(140,165,255,0.05)" stroke-width="0.7"/>
        <g transform="translate(90,120)" style="animation:orbitRing 8s linear ${d}s infinite;transform-box:fill-box;transform-origin:50% 50%;"><ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="${sc}" stroke-width="0.5" stroke-opacity="0.22" stroke-dasharray="3 4"/></g>
        <g transform="translate(90,120)" style="animation:orbitRingRev 12s linear ${d}s infinite;transform-box:fill-box;transform-origin:50% 50%;"><ellipse cx="0" cy="0" rx="22" ry="8" fill="none" stroke="${sc}" stroke-width="0.4" stroke-opacity="0.16" stroke-dasharray="2 5"/></g>
        <g fill="${sc}" opacity="0.38" font-family="Georgia,serif" font-size="11" text-anchor="middle"><text x="50" y="76">${suit}</text><text x="130" y="76">${suit}</text><text x="50" y="183">${suit}</text><text x="130" y="183">${suit}</text></g>
        <text x="90" y="120" font-family="Georgia,serif" font-size="54" text-anchor="middle" dominant-baseline="middle" fill="${sc}" filter="url(#glow${idx})" style="animation:suitPulse 3s ease-in-out ${d}s infinite;transform-box:fill-box;transform-origin:50% 50%;">${suit}</text>
        <text x="90" y="120" font-family="Georgia,serif" font-style="italic" font-size="17" text-anchor="middle" dominant-baseline="middle" fill="rgba(210,220,255,0.16)">SG</text>
        <line x1="40" y1="60" x2="140" y2="60" stroke="rgba(160,175,255,0.11)" stroke-width="0.6"/>
        <line x1="40" y1="180" x2="140" y2="180" stroke="rgba(160,175,255,0.11)" stroke-width="0.6"/>
        <circle cx="34" cy="120" r="2" fill="${sc}" opacity="0.26" style="animation:cornerTwinkle 2s ease-in-out ${pd(0.3)}s infinite"/>
        <circle cx="146" cy="120" r="2" fill="${sc}" opacity="0.26" style="animation:cornerTwinkle 2s ease-in-out ${pd(0.7)}s infinite"/>
        <circle cx="62" cy="88" r="1.2" fill="${sc}" opacity="0.50" style="animation:particleDrift 3.1s ease-in-out ${pd(0.0)}s infinite"/>
        <circle cx="118" cy="98" r="1.0" fill="${sc}" opacity="0.40" style="animation:particleDrift 3.7s ease-in-out ${pd(0.5)}s infinite"/>
        <circle cx="75" cy="157" r="1.3" fill="${sc}" opacity="0.45" style="animation:particleDrift 2.8s ease-in-out ${pd(1.1)}s infinite"/>
        <circle cx="113" cy="147" r="1.0" fill="${sc}" opacity="0.35" style="animation:particleDrift 4.2s ease-in-out ${pd(0.8)}s infinite"/>
        <circle cx="90" cy="74" r="0.9" fill="rgba(220,230,255,0.6)" style="animation:particleDrift 3.4s ease-in-out ${pd(1.4)}s infinite"/>
        <circle cx="55" cy="140" r="0.8" fill="${sc}" opacity="0.30" style="animation:particleDrift 5.0s ease-in-out ${pd(2.0)}s infinite"/>
        <circle cx="128" cy="155" r="0.9" fill="${sc}" opacity="0.32" style="animation:particleDrift 4.6s ease-in-out ${pd(1.7)}s infinite"/>
        <rect width="180" height="240" fill="url(#vg${idx})" rx="12"/>
        <text x="166" y="233" font-family="'Inter',sans-serif" font-size="7" text-anchor="end" fill="rgba(140,165,255,0.18)" letter-spacing="1">${String(idx+1).padStart(2,'0')}</text>
      </svg>`;
    }

    function makeFrontHTML(p) {
      const linkAttr=(p.link&&p.link!=='#')
        ?`href="${p.link}" target="_blank" rel="noopener"`
        :`href="${p.link}"`;
      return `
        <span class="fr-tag">${p.tag}</span>
        <span class="fr-date">${p.date}</span>
        <div class="fr-rule"></div>
        <div class="fr-title">${p.title}</div>
        <div class="fr-body">${p.body}</div>
        <a class="fr-link" ${linkAttr}>${p.linkLabel}</a>
      `;
    }

    const popupOverlay = document.getElementById('cardPopupOverlay');
    const popupInner   = document.getElementById('cardPopupInner');
    const popupFlipper = document.getElementById('cardPopupFlipper');
    const popupClose   = document.getElementById('cardPopupClose');

    let activeSceneEl = null;
    let activeIdx     = -1;
    let popupLocked   = false;

    function buildPopupCard(idx) {
      popupFlipper.innerHTML = '';
      popupFlipper.classList.remove('flipped');
      const back = document.createElement('div');
      back.className = 'card-face card-back';
      back.innerHTML = makeCardBackSVG(idx);
      const aurora = document.createElement('div');
      aurora.className = 'cb-aurora';
      aurora.style.animationDelay = (idx*0.55)+'s';
      back.appendChild(aurora);
      const shimmer = document.createElement('div');
      shimmer.className = 'cb-shimmer';
      shimmer.style.animationDelay = (idx*0.60)+'s';
      back.appendChild(shimmer);
      const burst = document.createElement('div');
      burst.className = 'cb-burst';
      back.appendChild(burst);
      const front = document.createElement('div');
      front.className = 'card-face card-front';
      front.innerHTML = makeFrontHTML(PROJECTS[idx]);
      popupFlipper.appendChild(back);
      popupFlipper.appendChild(front);
      return { burst };
    }

    function openPopup(sceneEl, idx) {
      if (popupLocked) return;
      popupLocked = true;
      activeSceneEl = sceneEl;
      activeIdx = idx;
      const { burst } = buildPopupCard(idx);
      popupInner.classList.remove('dismissing');
      popupOverlay.classList.add('visible');
      setTimeout(() => {
        popupFlipper.classList.add('flipped');
        popupInner.classList.add('bursting');
        burst.addEventListener('animationend', () => {
          popupInner.classList.remove('bursting');
        }, { once: true });
        setTimeout(() => { popupLocked = false; }, 700);
      }, 480);
    }

    function closePopup() {
      if (popupLocked || !activeSceneEl) return;
      popupLocked = true;
      popupInner.classList.add('dismissing');
      setTimeout(() => {
        popupOverlay.classList.remove('visible');
        popupInner.classList.remove('dismissing');
        activeSceneEl.classList.add('flipped', 'revealed');
        activeSceneEl = null;
        activeIdx = -1;
        popupLocked = false;
      }, 380);
    }

    popupClose.addEventListener('click', closePopup);
    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) closePopup();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePopup();
    });

    const grid = document.getElementById('memoryGrid');
    PROJECTS.forEach((p, i) => {
      const scene = document.createElement('div');
      scene.className = 'card-scene';
      scene.style.animationDelay = (i*0.07)+'s';
      const flipper = document.createElement('div');
      flipper.className = 'card-flipper';
      const back = document.createElement('div');
      back.className = 'card-face card-back';
      back.innerHTML = makeCardBackSVG(i);
      const aurora = document.createElement('div');
      aurora.className = 'cb-aurora';
      aurora.style.animationDelay = (i*0.55)+'s';
      back.appendChild(aurora);
      const shimmer = document.createElement('div');
      shimmer.className = 'cb-shimmer';
      shimmer.style.animationDelay = (i*0.60)+'s';
      back.appendChild(shimmer);
      const burst = document.createElement('div');
      burst.className = 'cb-burst';
      back.appendChild(burst);
      const front = document.createElement('div');
      front.className = 'card-face card-front';
      front.innerHTML = makeFrontHTML(p);
      flipper.appendChild(back);
      flipper.appendChild(front);
      scene.appendChild(flipper);
      grid.appendChild(scene);

      scene.addEventListener('animationend', (e) => {
        if (e.animationName === 'cardEntrance') {
          scene.style.opacity = '1';
          scene.style.animation = 'none';
          requestAnimationFrame(() => {
            scene.style.animationDelay = (i*0.38)+'s';
            scene.classList.add('floating');
          });
        }
      }, { once: true });

      scene.addEventListener('mousemove', (e) => {
        if (scene.classList.contains('revealed')) return;
        const r = scene.getBoundingClientRect();
        const mx = (e.clientX-r.left)/r.width-0.5;
        const my = (e.clientY-r.top)/r.height-0.5;
        flipper.style.transform = `rotateY(${mx*18}deg) rotateX(${-my*14}deg)`;
      });
      scene.addEventListener('mouseleave', () => {
        if (scene.classList.contains('revealed')) return;
        flipper.style.transform = '';
      });
      scene.addEventListener('click', (e) => {
        if (e.target.closest('.fr-link')) return;
        if (scene.classList.contains('revealed')) return;
        if (popupLocked) return;
        flipper.style.transform = '';
        openPopup(scene, i);
      });
    });
  </script>

  <!-- Stars background only (planets live on the home page) -->
  <script type="module">
    import('https://unpkg.com/three@0.161.0/build/three.module.js').then(THREE=>{
      const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(window.innerWidth,window.innerHeight);
      renderer.setClearColor(0x060d18,1);
      document.body.appendChild(renderer.domElement);
      const scene=new THREE.Scene();
      const camera=new THREE.PerspectiveCamera(36,window.innerWidth/window.innerHeight,0.1,500);
      camera.position.set(0,0,46);camera.lookAt(0,0,0);
      window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
      const N=7000,pos=new Float32Array(N*3),ph=new Float32Array(N),sp=new Float32Array(N),sz=new Float32Array(N);
      for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*220;pos[i*3+1]=(Math.random()-.5)*160;pos[i*3+2]=-Math.random()*260;ph[i]=Math.random()*Math.PI*2;sp[i]=.002+Math.random()*.005;sz[i]=.1+Math.random()*.2;}
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      geo.setAttribute('phase',new THREE.BufferAttribute(ph,1));
      geo.setAttribute('speed',new THREE.BufferAttribute(sp,1));
      geo.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
      const mat=new THREE.ShaderMaterial({uniforms:{time:{value:0}},vertexShader:`attribute float aSize;attribute float phase;attribute float speed;uniform float time;varying float vB;void main(){float r=abs(sin(time*speed+phase));vB=.7+.3*pow(r,.3);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(1.+2.*max(0.,r-.75)/.25)*(300./-mv.z);gl_Position=projectionMatrix*mv;}`,fragmentShader:`varying float vB;void main(){vec2 uv=gl_PointCoord-vec2(.5);if(length(uv)>.5)discard;float c=1.-smoothstep(0.,.45,length(uv));gl_FragColor=vec4(vec3(.75,.88,1.)*vB,c*vB);}`,transparent:true,depthWrite:false});
      scene.add(new THREE.Points(geo,mat));
      (function loop(t){requestAnimationFrame(loop);mat.uniforms.time.value=t*.001;renderer.render(scene,camera);})(0);
    });
  </script>
