<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Sofia Grimm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100%;background:#060d18;font-family:'Inter',sans-serif;color:#e9f0ff;overflow-x:hidden;}
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .nebula{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 50% 35% at 20% 60%,rgba(30,70,170,.07) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 30%,rgba(20,80,190,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 44% at 50% 50%,rgba(15,35,110,.05) 0%,transparent 65%);}
    nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;}
    .nav-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;letter-spacing:.06em;color:rgba(220,232,255,.9);text-decoration:none;}
    .nav-links{display:flex;align-items:center;gap:4px;}
    .nav-links a{font-size:13px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;color:rgba(160,190,255,.5);text-decoration:none;padding:7px 16px;border-radius:4px;transition:color .25s,background .25s;}
    .nav-links a:hover,.nav-links a.active{color:rgba(220,235,255,.9);background:rgba(100,140,255,.08);}
    .nav-links .divider{color:rgba(100,130,200,.2);font-size:13px;user-select:none;}

    /* ── Page wrapper ── */
    .page{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:110px 32px 100px;}
    .page-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(160,185,255,.45);margin-bottom:20px;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:300;line-height:1.08;color:#eef3ff;margin-bottom:14px;}
    .page-title em{font-style:italic;color:rgba(190,210,255,.85);}
    .page-subtitle{font-size:13px;font-weight:300;color:rgba(160,190,255,.40);letter-spacing:.06em;margin-bottom:36px;}
    .rule{width:48px;height:1px;background:linear-gradient(90deg,rgba(140,170,255,.4),transparent);margin-bottom:44px;}

    /* ═══════════════════════════════════════
       MEMORY GRID — all cards face-down
    ═══════════════════════════════════════ */
    .memory-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:18px;
    }

    /* ── Card shell (face-down tile) ── */
    .mem-card{
      position:relative;
      aspect-ratio:3/4;
      border-radius:14px;
      cursor:pointer;
      overflow:hidden;
      border:1px solid rgba(100,130,210,.13);
      background:rgba(8,16,50,.55);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      transition:transform .22s cubic-bezier(.22,1,.36,1), box-shadow .22s, border-color .22s;
      /* keeps original place in grid during expand animation */
    }
    .mem-card:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:0 12px 36px rgba(80,100,255,.18);
      border-color:rgba(140,170,255,.28);
    }
    .mem-card.expanding{
      pointer-events:none;
    }

    /* decorative back-of-card pattern */
    .mem-card-bg{
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 70% 55% at 60% 35%, rgba(60,90,220,.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 25% 75%, rgba(30,60,180,.08) 0%, transparent 60%);
    }
    .mem-card-pattern{
      position:absolute;inset:0;opacity:0.06;
      background-image:
        repeating-linear-gradient(45deg, rgba(180,190,255,.6) 0px, rgba(180,190,255,.6) 1px, transparent 1px, transparent 14px),
        repeating-linear-gradient(-45deg, rgba(180,190,255,.6) 0px, rgba(180,190,255,.6) 1px, transparent 1px, transparent 14px);
    }
    .mem-card-monogram{
      position:absolute;bottom:10px;right:14px;
      font-family:'Cormorant Garamond',serif;
      font-size:52px;font-weight:300;font-style:italic;
      color:rgba(140,165,255,.07);
      line-height:1;user-select:none;
    }
    .mem-card-num{
      position:absolute;top:14px;left:16px;
      font-size:10px;letter-spacing:.18em;
      color:rgba(140,170,255,.30);
      text-transform:uppercase;
    }
    .mem-card-hint{
      position:absolute;bottom:14px;left:0;right:0;
      text-align:center;
      font-size:9px;letter-spacing:.18em;text-transform:uppercase;
      color:rgba(120,150,220,.25);
    }
    /* subtle shimmer on hover */
    .mem-card::after{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);
      opacity:0;
      transition:opacity .22s;
      border-radius:14px;
    }
    .mem-card:hover::after{ opacity:1; }

    /* ═══════════════════════════════════════
       EXPANDED CARD OVERLAY
    ═══════════════════════════════════════ */
    .card-overlay{
      position:fixed;inset:0;
      z-index:200;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
    }
    .card-overlay.visible{
      pointer-events:auto;
      opacity:1;
    }

    /* dim backdrop */
    .overlay-backdrop{
      position:absolute;inset:0;
      background:rgba(4,8,25,.75);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      opacity:0;
      transition:opacity .35s cubic-bezier(.22,1,.36,1);
    }
    .card-overlay.visible .overlay-backdrop{
      opacity:1;
    }

    /* the expanded card itself */
    .expanded-card{
      position:relative;
      z-index:5;
      width:min(540px,90vw);
      border-radius:22px;
      padding:40px 44px 36px;
      background:rgba(6,14,44,.88);
      border:1px solid rgba(120,150,240,.18);
      box-shadow:0 24px 80px rgba(0,0,0,.75), inset 0 1px 0 rgba(200,210,255,.06);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      display:flex;flex-direction:column;gap:12px;
      transform:scale(0.82) translateY(24px);
      opacity:0;
      transition:transform .40s cubic-bezier(.22,1,.36,1), opacity .35s cubic-bezier(.22,1,.36,1);
    }
    .card-overlay.visible .expanded-card{
      transform:scale(1) translateY(0);
      opacity:1;
    }

    /* close button */
    .expanded-close{
      position:absolute;top:16px;right:18px;
      background:none;border:none;cursor:pointer;
      font-size:20px;line-height:1;
      color:rgba(160,170,255,.35);
      transition:color .2s;
      padding:4px 8px;
    }
    .expanded-close:hover{color:rgba(220,225,255,.85);}

    .ex-meta{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
    .ex-tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(140,175,255,.5);}
    .ex-date{font-size:10px;letter-spacing:.1em;color:rgba(120,150,210,.32);white-space:nowrap;}
    .ex-rule{width:36px;height:1px;background:linear-gradient(90deg,rgba(150,170,255,.3),transparent);}
    .ex-title{
      font-family:'Cormorant Garamond',serif;
      font-size:26px;font-weight:300;line-height:1.25;
      color:#ddeeff;
    }
    .ex-body{
      font-size:13px;font-weight:300;line-height:1.75;
      color:rgba(190,210,255,.58);
    }
    .ex-link{
      align-self:flex-start;
      margin-top:4px;
      font-size:11px;letter-spacing:.14em;text-transform:uppercase;
      color:rgba(150,185,255,.55);text-decoration:none;
      border-bottom:1px solid rgba(140,180,255,.15);
      transition:color .2s;
    }
    .ex-link:hover{color:rgba(210,225,255,.9);}

    .coords{position:fixed;bottom:32px;left:48px;z-index:20;font-size:10px;letter-spacing:.18em;color:rgba(110,130,190,.28);font-weight:300;pointer-events:none;}
  </style>
</head>
<body>
  <div class="nebula"></div>
  <nav>
    <a class="nav-name" href="index.html">Sofia Grimm</a>
    <div class="nav-links">
      <a href="index.html">Home</a><span class="divider">|</span>
      <a href="about.html">About</a><span class="divider">|</span>
      <a href="research.html">Research</a><span class="divider">|</span>
      <a href="projects.html" class="active">Projects</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-eyebrow">Projects</div>
    <h1 class="page-title">Things I've <em>built.</em></h1>
    <p class="page-subtitle">Click any card to reveal.</p>
    <div class="rule"></div>
    <div class="memory-grid" id="memoryGrid"></div>
  </main>

  <!-- Expanded card overlay -->
  <div class="card-overlay" id="cardOverlay">
    <div class="overlay-backdrop" id="overlayBackdrop"></div>
    <div class="expanded-card" id="expandedCard">
      <button class="expanded-close" id="expandedClose">&times;</button>
      <div class="ex-meta">
        <span class="ex-tag" id="exTag"></span>
        <span class="ex-date" id="exDate"></span>
      </div>
      <div class="ex-rule"></div>
      <div class="ex-title" id="exTitle"></div>
      <div class="ex-body" id="exBody"></div>
      <a class="ex-link" id="exLink" href="#">Details</a>
    </div>
  </div>

  <div class="coords">41.3083&deg; N &nbsp; 72.9279&deg; W</div>

  <script>
    const PROJECTS = [
      {
        tag:"Startup · MedTech", date:"Mar 2026 – Present",
        title:"PCDD — Patient Controlled Dispenser & Deactivator",
        body:"Developing business strategy for a patent-pending medication disposal device at Yale School of Engineering under Dr. Wiznia. Work spans ingress mechanisms, activated charcoal deactivation protocols, and go-to-market planning.",
        link:"#", linkLabel:"In progress →"
      },
      {
        tag:"Hackathon · Best Solo Hack", date:"2026",
        title:"YHack 2026 — Best Solo Hack",
        body:"Won Best Solo Hack at YHack 2026, Yale's annual hackathon. Built and shipped a complete project independently under time constraints.",
        link:"#", linkLabel:"Details coming →"
      },
      {
        tag:"Healthcare · Consulting", date:"Jan 2026 – Present",
        title:"Decision Support Tool — American Red Cross",
        body:"Configuring a decision support tool for the American Red Cross to assist in annual resource planning. Benchmarks required vehicle counts against live inventory, quantifying regional surplus to inform fleet allocation. Also leading data-driven improvements to Mental Health CT's Art of Wellbeing program.",
        link:"#", linkLabel:"In progress →"
      },
      {
        tag:"Strategy · Consulting", date:"Feb 2026 – Present",
        title:"ASEAN Market Expansion Strategy",
        body:"Advising a Malaysian non-profit on expansion across ASEAN markets as an Associate Consultant at Global Strategy Consulting. Developing a market readiness framework and analyzing regional youth ecosystems to prioritize pilot launch markets.",
        link:"#", linkLabel:"In progress →"
      },
      {
        tag:"ML · Astrophysics", date:"2023",
        title:"Gravitational Lens CNN Classifier — Fermilab",
        body:"Generated two 40,000-image benchmark datasets of double-source plane lenses and Einstein rings at Fermi National Accelerator Laboratory. Trained CNNs (PyTorch) for automated morphological classification. Published at AGU Annual Meeting and Fermilab/Quarknet Workshop.",
        link:"https://agu.confex.com/agu/fm23/meetingapp.cgi/Paper/1438256", linkLabel:"View publication →"
      },
      {
        tag:"Operations Research · Policy", date:"2022 – 2023",
        title:"Green Vehicle Routing — CCIR",
        body:"Used a mixed-integer linear programming framework to optimize transportation routes for the Green Vehicle problem through the Cambridge Center for International Research Future Scholar Program. Awarded the CCIR STEM Scholarship and nominated as a Spotlight Scholar.",
        link:"#", linkLabel:"CCIR Spotlight Scholar →"
      },
      {
        tag:"Web · 3D Design", date:"2026",
        title:"This Portfolio",
        body:"An interactive 3D orbital homepage built with Three.js — twinkling constellations, self-rotating ringed planets, and a frosted-glass centre card. Designed and iterated entirely from scratch.",
        link:"index.html", linkLabel:"View live →"
      },
      {
        tag:"Finance · Investing", date:"2022 – 2025",
        title:"Latin School Investment Fund",
        body:"Board member managing a $100,000 student-run stock portfolio as one of eleven voting members. Gave weekly portfolio stock reports and pitched new investments to the Board.",
        link:"#", linkLabel:"Details →"
      }
    ];

    const grid     = document.getElementById('memoryGrid');
    const overlay  = document.getElementById('cardOverlay');
    const exClose  = document.getElementById('expandedClose');
    const backdrop = document.getElementById('overlayBackdrop');

    let activeCardEl = null;

    /* Build the grid */
    PROJECTS.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'mem-card';
      card.innerHTML = `
        <div class="mem-card-bg"></div>
        <div class="mem-card-pattern"></div>
        <span class="mem-card-num">${String(i+1).padStart(2,'0')}</span>
        <span class="mem-card-monogram">SG</span>
        <span class="mem-card-hint">reveal</span>
      `;
      card.addEventListener('click', () => openCard(p, card));
      grid.appendChild(card);
    });

    function openCard(p, cardEl) {
      /* populate expanded card */
      document.getElementById('exTag').textContent   = p.tag;
      document.getElementById('exDate').textContent  = p.date;
      document.getElementById('exTitle').textContent = p.title;
      document.getElementById('exBody').textContent  = p.body;
      const link = document.getElementById('exLink');
      link.textContent = p.linkLabel;
      link.href = p.link;
      if (p.link && p.link !== '#') link.setAttribute('target','_blank');
      else link.removeAttribute('target');

      activeCardEl = cardEl;

      /* show overlay — CSS transition handles animation */
      overlay.classList.add('visible');
    }

    function closeCard() {
      overlay.classList.remove('visible');
      activeCardEl = null;
    }

    exClose.addEventListener('click', closeCard);
    backdrop.addEventListener('click', closeCard);

    /* Keyboard escape */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeCard();
    });
  </script>

  <!-- Starfield -->
  <script type="module">
    import('https://unpkg.com/three@0.161.0/build/three.module.js').then(THREE=>{
      const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(window.innerWidth,window.innerHeight);
      renderer.setClearColor(0x060d18,1);
      document.body.appendChild(renderer.domElement);
      const scene=new THREE.Scene();
      const camera=new THREE.PerspectiveCamera(36,window.innerWidth/window.innerHeight,.1,500);
      camera.position.set(0,0,46);camera.lookAt(0,0,0);
      window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
      const N=7000,pos=new Float32Array(N*3),ph=new Float32Array(N),sp=new Float32Array(N),sz=new Float32Array(N);
      for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*220;pos[i*3+1]=(Math.random()-.5)*160;pos[i*3+2]=-Math.random()*260;ph[i]=Math.random()*Math.PI*2;sp[i]=.002+Math.random()*.005;sz[i]=.1+Math.random()*.2;}
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      geo.setAttribute('phase',new THREE.BufferAttribute(ph,1));
      geo.setAttribute('speed',new THREE.BufferAttribute(sp,1));
      geo.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
      const mat=new THREE.ShaderMaterial({uniforms:{time:{value:0}},vertexShader:`attribute float aSize;attribute float phase;attribute float speed;uniform float time;varying float vB;void main(){float r=abs(sin(time*speed+phase));vB=.7+.3*pow(r,.3);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(1.+2.*max(0.,r-.75)/.25)*(300./-mv.z);gl_Position=projectionMatrix*mv;}`,fragmentShader:`varying float vB;void main(){vec2 uv=gl_PointCoord-vec2(.5);if(length(uv)>.5)discard;float c=1.-smoothstep(0.,.45,length(uv));gl_FragColor=vec4(vec3(.75,.88,1.)*vB,c*vB);}`,transparent:true,depthWrite:false});
      scene.add(new THREE.Points(geo,mat));
      (function loop(t){requestAnimationFrame(loop);mat.uniforms.time.value=t*.001;renderer.render(scene,camera);})(0);
    });
  </script>
</body>
</html>
