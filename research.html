  <script type="module">
    import * as THREE from 'three';

    const SITES=[

       eyebrow:'Neuroscience · Neurodegeneration',

      {id:'stanford',lat:37.43,lon:-122.17,color:new THREE.Color(0xffd880),

      {id:'fermilab',lat:41.84,lon:-88.27,color:new THREE.Color(0xd8a0ff),
       eyebrow:'Astrophysics · Machine Learning',
       title:'CNN Classification of Gravitational Lens Morphologies',
       org:'Fermi National Accelerator Lab · Quarknet',date:'Jun – Aug 2023',
       bullets:['Generated two 40,000-image datasets of double-source plane lenses.',
                'Trained CNNs (PyTorch) for automated morphological classification.'],
       links:[{label:'AGU Annual Meeting →',href:'https://agu.confex.com/agu/fm23/meetingapp.cgi/Paper/1438256'},
              {label:'Fermilab/Quarknet Workshop →',href:'https://doi.org/10.2172/2006481'}]}
    ];

    const W=()=>window.innerWidth, H=()=>window.innerHeight;
    const canvas=document.getElementById('c');
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(W(),H());
    renderer.setClearColor(0x04080f,1);
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=1.05;

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(38,W()/H(),0.1,500);
    camera.position.set(0,0,3.6);
    camera.lookAt(0,0,0);
    window.addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H());});

    /* ---- STARS ---- */
    {
      const N=10000,p=new Float32Array(N*3),ph=new Float32Array(N),sp=new Float32Array(N),sz=new Float32Array(N),col=new Float32Array(N*3);
      const sc=[[.82,.88,1],[.92,.84,1],[1,.93,.84],[.80,.92,1]];
      for(let i=0;i<N;i++){
        const u=Math.random()*Math.PI*2,v=Math.acos(2*Math.random()-1),r=80+Math.random()*120;
        p[i*3]=r*Math.sin(v)*Math.cos(u);p[i*3+1]=r*Math.sin(v)*Math.sin(u);p[i*3+2]=r*Math.cos(v);
        ph[i]=Math.random()*Math.PI*2;sp[i]=.0015+Math.random()*.005;sz[i]=.5+Math.random()*1.8;
        const c=sc[Math.floor(Math.random()*sc.length)];col[i*3]=c[0];col[i*3+1]=c[1];col[i*3+2]=c[2];
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('phase',new THREE.BufferAttribute(ph,1));
      g.setAttribute('speed',new THREE.BufferAttribute(sp,1));
      g.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
      g.setAttribute('aColor',new THREE.BufferAttribute(col,3));
      const sm=new THREE.ShaderMaterial({
        uniforms:{time:{value:0}},
        vertexShader:`attribute float aSize,phase,speed;attribute vec3 aColor;uniform float time;varying float vB;varying vec3 vCol;
          void main(){float r=abs(sin(time*speed+phase));vB=.55+.45*pow(r,.3);vCol=aColor;
            vec4 mv=modelViewMatrix*vec4(position,1.);float sb=1.+5.*max(0.,r-.70)/.30;
            gl_PointSize=aSize*sb*(280./-mv.z);gl_Position=projectionMatrix*mv;}`,
        fragmentShader:`varying float vB;varying vec3 vCol;
          void main(){vec2 uv=gl_PointCoord-.5;float d=length(uv);if(d>.5)discard;
            float c=1.-smoothstep(0.,.42,d);
            float spike=max(0.,1.-abs(uv.x)*12.)*max(0.,1.-abs(uv.y)*12.)*.25;
            gl_FragColor=vec4(vCol*vB,(c+spike)*vB);}`,
        transparent:true,depthWrite:false});
      scene.add(new THREE.Points(g,sm));
      window._sm=sm;
    }

    /* ---- LIGHTING ---- */
    scene.add(new THREE.AmbientLight(0x0d1a33,1.2));
    const sun=new THREE.DirectionalLight(0xfff6e8,3.8);
    sun.position.set(6,2.5,4); scene.add(sun);
    const fill=new THREE.DirectionalLight(0x1a3a88,0.35);
    fill.position.set(-5,0,-3); scene.add(fill);

    /* =============================================
       REALISTIC EARTH — photorealistic texture pass
       ============================================= */
    const R=1.0;

    function makeEarthTex(){
      const S=2048;
      const cv=document.createElement('canvas');cv.width=S;cv.height=S;
      const ctx=cv.getContext('2d');

      /* ── Ocean base: realistic dark navy → mid blue ── */
      const og=ctx.createLinearGradient(0,0,0,S);
      og.addColorStop(0,   '#081630');
      og.addColorStop(0.12,'#0a1e42');
      og.addColorStop(0.30,'#0c2450');
      og.addColorStop(0.50,'#0d2860');
      og.addColorStop(0.70,'#0c2450');
      og.addColorStop(0.88,'#0a1e42');
      og.addColorStop(1,   '#081630');
      ctx.fillStyle=og; ctx.fillRect(0,0,S,S);

      /* ── Land definitions: [cx%, cy%, rx%, ry%, baseColor, highlight?] ──
         Equirectangular: x=longitude 0→360 mapped 0→S, y=lat 90→-90 mapped 0→S */
      const L=[
        // ── North America ──
        // Main landmass (broad brush)
        [0.155,0.195,0.080,0.055,'#2a5e26',true],
        [0.152,0.250,0.075,0.070,'#2e6628',true],
        [0.148,0.310,0.065,0.065,'#337030',true],
        [0.155,0.368,0.060,0.058,'#306830',true],
        [0.162,0.418,0.052,0.050,'#347534',true],
        // Western highlands (darker green-brown)
        [0.132,0.230,0.028,0.055,'#4a6030',true],
        [0.128,0.290,0.024,0.060,'#4a5c28'],
        // Eastern seaboard

        // Mexico / Central America
        [0.172,0.430,0.030,0.035,'#3a7432'],
        [0.178,0.456,0.022,0.022,'#3a6e30'],
        // Florida peninsula
        [0.186,0.382,0.012,0.025,'#2e6828'],
        // Greenland
        [0.152,0.108,0.032,0.052,'#c8d8e6'],
        [0.148,0.092,0.024,0.030,'#dce8f0'],
        // Caribbean islands (dots)
        [0.200,0.430,0.008,0.006,'#348030'],
        [0.192,0.436,0.006,0.005,'#308030'],

        // ── South America ──
        [0.196,0.470,0.046,0.048,'#267028'],
        [0.190,0.518,0.050,0.055,'#206820'],
        [0.200,0.572,0.052,0.062,'#1e6020'],
        [0.196,0.630,0.044,0.055,'#1a5818'],
        [0.200,0.680,0.038,0.040,'#1c5c1a'],
        [0.194,0.706,0.032,0.028,'#1e6018'],
        // Andes (brown strip)
        [0.172,0.530,0.012,0.090,'#6a5030'],
        [0.170,0.620,0.010,0.060,'#604828'],

        // ── Europe ──
        [0.462,0.200,0.032,0.042,'#4a7030'],
        [0.480,0.222,0.034,0.044,'#507838'],
        [0.468,0.252,0.028,0.038,'#4e7432'],
        [0.450,0.228,0.022,0.035,'#486830'],
        // Iberian Peninsula
        [0.448,0.268,0.020,0.028,'#8a7438'],
        // Italy boot
        [0.482,0.272,0.010,0.030,'#608040'],
        // UK/Ireland
        [0.462,0.188,0.012,0.018,'#487040'],
        // Scandinavia
        [0.480,0.155,0.020,0.042,'#406835'],
        [0.490,0.132,0.014,0.030,'#3c6030'],
        // Iceland
        [0.430,0.152,0.016,0.014,'#b0c4d0'],

        // ── Africa ──
        [0.488,0.322,0.044,0.042,'#907840'],
        [0.490,0.368,0.050,0.052,'#886e38'],

        [0.488,0.352,0.048,0.028,'#c8a860'],

        // Congo rainforest
        [0.492,0.468,0.030,0.030,'#206018'],
        // Madagascar
        [0.540,0.546,0.012,0.024,'#6a5c30'],

        // ── Middle East / Arabia ──
        [0.545,0.300,0.036,0.040,'#b09840'],
        [0.558,0.330,0.030,0.038,'#a89038'],
        [0.550,0.358,0.028,0.030,'#a08830'],

        // ── Asia ──
        // Anatolia / Turkey
        [0.535,0.248,0.030,0.022,'#8a7a38'],
        // Russia/Siberia (huge)
        [0.555,0.145,0.080,0.060,'#5a7030'],
        [0.620,0.120,0.090,0.058,'#527028'],
        [0.680,0.110,0.085,0.055,'#4e6828'],
        [0.740,0.118,0.075,0.058,'#4a6428'],
        // Central Asia
        [0.575,0.220,0.055,0.048,'#8a8038'],
        [0.625,0.218,0.055,0.048,'#809038'],
        [0.665,0.215,0.050,0.046,'#788838'],
        // Indian subcontinent
        [0.598,0.330,0.038,0.040,'#7a8040'],
        [0.602,0.368,0.034,0.040,'#6e7838'],
        [0.608,0.408,0.028,0.038,'#608030'],
        [0.608,0.440,0.022,0.030,'#587828'],
        // Sri Lanka
        [0.612,0.470,0.006,0.008,'#508028'],
        // China / East Asia
        [0.660,0.222,0.068,0.058,'#5a7030'],
        [0.688,0.240,0.058,0.050,'#527030'],
        [0.708,0.268,0.048,0.045,'#4a6828'],
        [0.715,0.295,0.040,0.040,'#486028'],
        // Korea
        [0.730,0.262,0.012,0.018,'#4e7030'],
        // Japan
        [0.742,0.246,0.010,0.028,'#507838'],

        // Taiwan
        [0.730,0.320,0.006,0.010,'#488038'],

        // ── Polar ──
        // Antarctica
        [0.500,0.940,0.340,0.062,'#d8e8f4'],
        [0.500,0.968,0.360,0.036,'#e4eef8'],
        [0.500,0.984,0.340,0.020,'#eef4fc'],

        [0.500,0.010,0.250,0.025,'#d0e0f0'],
      ];

      /* Draw each land mass */
      L.forEach(([cfx,cfy,rfx,rfy,baseCol,highlight])=>{
        const cx=cfx*S,cy=cfy*S,rx=rfx*S,ry=rfy*S;
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
        const grd=ctx.createRadialGradient(cx-rx*.2,cy-ry*.2,0,cx,cy,Math.max(rx,ry)*1.05);
        grd.addColorStop(0,  baseCol+'ff');
        grd.addColorStop(0.55,baseCol+'dd');
        grd.addColorStop(0.85,baseCol+'66');
        grd.addColorStop(1,  baseCol+'00');
        ctx.fillStyle=grd;
        ctx.fill();
        ctx.restore();
      });

      /* Coastal shallow water glow */
      L.slice(0,-5).forEach(([cfx,cfy,rfx,rfy])=>{
        const cx=cfx*S,cy=cfy*S,rx=(rfx+.008)*S,ry=(rfy+.008)*S;
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
        const g=ctx.createRadialGradient(cx,cy,Math.min(rfx,rfy)*.6*S,cx,cy,Math.max(rx,ry)*1.1);
        g.addColorStop(0,'rgba(0,0,0,0)');
        g.addColorStop(1,'rgba(15,70,160,0.09)');
        ctx.fillStyle=g;
        ctx.fill();
        ctx.restore();
      });

      /* Subtle per-pixel noise for grain */
      const id=ctx.getImageData(0,0,S,S);
      for(let i=0;i<id.data.length;i+=4){
        const n=(Math.random()-.5)*10;
        id.data[i]  =Math.min(255,Math.max(0,id.data[i]  +n));
        id.data[i+1]=Math.min(255,Math.max(0,id.data[i+1]+n));
        id.data[i+2]=Math.min(255,Math.max(0,id.data[i+2]+n));
      }
      ctx.putImageData(id,0,0);

      /* Polar latitude vignette */
      const lbg=ctx.createLinearGradient(0,0,0,S);
      lbg.addColorStop(0,  'rgba(160,195,235,0.13)');
      lbg.addColorStop(0.14,'rgba(0,0,0,0)');
      lbg.addColorStop(0.86,'rgba(0,0,0,0)');
      lbg.addColorStop(1,  'rgba(160,195,235,0.13)');
      ctx.fillStyle=lbg; ctx.fillRect(0,0,S,S);

      return new THREE.CanvasTexture(cv);
    }

    /* Specular map: ocean=bright, land=dark, ice=bright */
    function makeSpecTex(){
      const S=1024;
      const cv=document.createElement('canvas');cv.width=S;cv.height=S;
      const ctx=cv.getContext('2d');
      /* Ocean: medium-high specular */
      ctx.fillStyle='#8899aa'; ctx.fillRect(0,0,S,S);
      /* Land matte patches */
      const matte=[
        [0.155,0.280,0.13,0.18],[0.190,0.560,0.11,0.18],[0.194,0.650,0.09,0.14],
        [0.465,0.230,0.07,0.10],[0.490,0.480,0.11,0.16],[0.550,0.320,0.07,0.08],
        [0.570,0.190,0.13,0.10],[0.630,0.200,0.14,0.11],[0.685,0.250,0.12,0.10],
        [0.600,0.370,0.09,0.10],[0.720,0.440,0.05,0.06],[0.730,0.625,0.10,0.11],
      ];
      ctx.fillStyle='#1a2430';
      matte.forEach(([cfx,cfy,rfx,rfy])=>{
        const cx=cfx*S,cy=cfy*S,rx=rfx*S,ry=rfy*S;
        ctx.save();ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
        ctx.fill();ctx.restore();
      });
      /* Polar ice caps: very bright specular */
      ctx.fillStyle='rgba(230,242,255,0.95)';
      ctx.beginPath();ctx.ellipse(S/2,S*.025,S*.30,S*.046,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(S/2,S*.960,S*.36,S*.055,0,0,Math.PI*2);ctx.fill();
      return new THREE.CanvasTexture(cv);
    }

    const earthTex=makeEarthTex();
    const specTex=makeSpecTex();

    const globeMat=new THREE.ShaderMaterial({
      uniforms:{
        earthMap:{value:earthTex},
        specMap: {value:specTex},
        sunDir:  {value:sun.position.clone().normalize()},
        time:    {value:0},
        camPos:  {value:camera.position.clone()},
      },
      vertexShader:`
        varying vec2 vUv;varying vec3 vNormal;varying vec3 vWorldPos;
        void main(){
          vUv=uv;
          vNormal=normalize(normalMatrix*normal);
          vec4 wp=modelMatrix*vec4(position,1.);vWorldPos=wp.xyz;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
        }`,
      fragmentShader:`
        uniform sampler2D earthMap,specMap;
        uniform vec3 sunDir,camPos;
        uniform float time;
        varying vec2 vUv;varying vec3 vNormal;varying vec3 vWorldPos;

        void main(){
          vec3 baseCol=texture2D(earthMap,vUv).rgb;
          float spec=texture2D(specMap,vUv).r;

          vec3 sDir=normalize(sunDir);
          float NdL=dot(vNormal,sDir);
          float diff=max(0.,NdL);

          /* Soft hemisphere ambient */
          vec3 amb=mix(vec3(.012,.018,.040),vec3(.035,.040,.055),diff);

          /* Day lighting: warm sunlight */
          vec3 dayCol=baseCol*(amb+vec3(.98,.93,.86)*diff*1.05);

          /* Night side: almost black with faint blue glow */
          float nightT=smoothstep(.10,-.10,NdL);
          vec3 nightCol=baseCol*vec3(.03,.035,.06)+vec3(.000,.001,.004)*spec;
          vec3 col=mix(dayCol,nightCol,nightT);

          /* Specular highlight — ocean only */
          vec3 viewDir=normalize(camPos-vWorldPos);
          vec3 halfV=normalize(sDir+viewDir);
          float sh=pow(max(0.,dot(vNormal,halfV)),180.)*spec*max(0.,NdL);
          col+=vec3(.80,.88,1.0)*sh*0.65;

          /* Terminator colour shift — limb goes cool blue */
          float term=smoothstep(-.04,.06,NdL);
          col=mix(col*vec3(.60,.70,.90),col,term);

          gl_FragColor=vec4(clamp(col,0.,1.),1.);
        }`,
    });

    const globe=new THREE.Mesh(new THREE.SphereGeometry(R,128,128),globeMat);
    scene.add(globe);

    /* ---- CLOUD LAYER ---- */
    function makeCloudTex(){
      const s=1024,cv=document.createElement('canvas');cv.width=s;cv.height=s;
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,s,s);
      /* Realistic cloud bands */
      const bands=[
        {y:.18,spread:.10,alpha:.22},
        {y:.30,spread:.08,alpha:.16},
        {y:.50,spread:.06,alpha:.12},
        {y:.70,spread:.09,alpha:.18},
        {y:.82,spread:.07,alpha:.14},
      ];
      bands.forEach(({y,spread,alpha})=>{
        const bg=ctx.createLinearGradient(0,(y-spread)*s,0,(y+spread)*s);
        bg.addColorStop(0,'rgba(255,255,255,0)');
        bg.addColorStop(.5,`rgba(255,255,255,${alpha})`);
        bg.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=bg;ctx.fillRect(0,0,s,s);
      });
      /* Scattered cumulus */
      for(let i=0;i<140;i++){
        const x=Math.random()*s,y=Math.random()*s,r=20+Math.random()*60;
        const grd=ctx.createRadialGradient(x,y,0,x,y,r);
        grd.addColorStop(0,'rgba(255,255,255,0.26)');
        grd.addColorStop(.4,'rgba(248,252,255,0.11)');
        grd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grd;ctx.fillRect(0,0,s,s);
      }
      return new THREE.CanvasTexture(cv);
    }
    const cloudMat=new THREE.ShaderMaterial({
      uniforms:{cloudMap:{value:makeCloudTex()},time:{value:0},sunDir:{value:sun.position.clone().normalize()}},
      vertexShader:`varying vec2 vUv;varying vec3 vNormal;
        void main(){vUv=uv;vNormal=normalize(normalMatrix*normal);
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform sampler2D cloudMap;uniform float time;uniform vec3 sunDir;
        varying vec2 vUv;varying vec3 vNormal;
        void main(){
          vec2 uv2=vUv+vec2(time*.00016,time*.000048);
          float a=texture2D(cloudMap,uv2).r;
          float cosA=max(0.,dot(vNormal,normalize(sunDir)));
          vec3 col=mix(vec3(.52,.55,.62),vec3(1.,1.,1.),cosA);
          gl_FragColor=vec4(col,a*.48);}`,
      transparent:true,depthWrite:false,blending:THREE.NormalBlending
    });
    const clouds=new THREE.Mesh(new THREE.SphereGeometry(R*1.008,96,96),cloudMat);
    scene.add(clouds);

    /* ---- ATMOSPHERE — thin realistic limb glow ---- */
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.072,64,64),new THREE.ShaderMaterial({
      vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec3 vN;void main(){float e=1.-clamp(dot(vN,vec3(0.,0.,1.)),0.,1.);gl_FragColor=vec4(.35,.58,.95,pow(e,6.0)*.14);}`,
      side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false})));
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.016,64,64),new THREE.ShaderMaterial({
      vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec3 vN;void main(){float e=1.-clamp(dot(vN,vec3(0.,0.,1.)),0.,1.);gl_FragColor=vec4(.45,.68,.98,pow(e,8.)*0.38);}`,
      side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false})));

    /* ---- HELPERS ---- */
    function ll2v(lat,lon,r){
      const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
      return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    }
    function makeGlowTex(hex){
      const cv=document.createElement('canvas');cv.width=128;cv.height=128;
      const ctx=cv.getContext('2d');
      const col=new THREE.Color(hex);
      const r=Math.round(col.r*255),g=Math.round(col.g*255),b=Math.round(col.b*255);
      const grd=ctx.createRadialGradient(64,64,0,64,64,64);
      grd.addColorStop(0,`rgba(${r},${g},${b},0.95)`);
      grd.addColorStop(.18,`rgba(${r},${g},${b},0.65)`);
      grd.addColorStop(.45,`rgba(${r},${g},${b},0.20)`);
      grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.fillStyle=grd;ctx.fillRect(0,0,128,128);
      return new THREE.CanvasTexture(cv);
    }

    /* ---- PINS ---- */
    const pinMeshes=[],pinGroup=new THREE.Group();
    scene.add(pinGroup);
    SITES.forEach((s,i)=>{
      const pos=ll2v(s.lat,s.lon,R),norm=pos.clone().normalize();
      const spike=new THREE.Mesh(new THREE.CylinderGeometry(.0015,.007,.07,6),new THREE.MeshBasicMaterial({color:s.color}));
      const dot=new THREE.Mesh(new THREE.SphereGeometry(.018,16,16),new THREE.MeshBasicMaterial({color:s.color}));
      dot.position.y=.046;
      const glowSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:makeGlowTex(s.color.getHex()),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:.9}));
      glowSprite.scale.set(.16,.16,1);
      const grp=new THREE.Group();
      grp.add(spike,dot);
      grp.position.copy(pos);
      grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),norm);
      pinGroup.add(grp);
      const gw=pos.clone().add(norm.clone().multiplyScalar(.08));
      glowSprite.position.copy(gw);
      scene.add(glowSprite);
      pinMeshes.push({grp,dot,glowSprite,site:s,phase:i*1.4});
    });

    /* ---- PANEL ---- */
    const panel=document.getElementById('panel');
    document.getElementById('pClose').addEventListener('click',()=>panel.classList.remove('open'));
    function openPanel(s){
      document.getElementById('pBar').style.background='#'+s.color.getHexString();
      document.getElementById('pEye').textContent=s.eyebrow;
      document.getElementById('pTit').textContent=s.title;
      document.getElementById('pOrg').textContent=s.org;
      document.getElementById('pDat').textContent=s.date;
      const ul=document.createElement('ul');
      s.bullets.forEach(b=>{const li=document.createElement('li');li.textContent=b;ul.appendChild(li);});
      const bd=document.getElementById('pBod');bd.innerHTML='';bd.appendChild(ul);
      const lk=document.getElementById('pLnk');lk.innerHTML='';
      s.links.forEach(l=>{const a=document.createElement('a');a.href=l.href;a.target='_blank';a.textContent=l.label;lk.appendChild(a);});
      panel.classList.add('open');
    }

    /* ---- DRAG / INERTIA ---- */
    let dragging=false,px=0,py=0,vx=0,vy=0,autoSpin=true,moved=false;
    function startDrag(x,y){dragging=true;px=x;py=y;autoSpin=false;moved=false;}
    function moveDrag(x,y){if(!dragging)return;moved=true;
      const dx=x-px,dy=y-py;px=x;py=y;
      vx=dy*.005;vy=dx*.005;
      globe.rotation.y+=vy;pinGroup.rotation.y+=vy;
      globe.rotation.x+=vx;pinGroup.rotation.x+=vx;
      syncGlowSprites();}
    function endDrag(){dragging=false;}
    canvas.addEventListener('mousedown',e=>startDrag(e.clientX,e.clientY));
    window.addEventListener('mousemove',e=>{if(dragging)moveDrag(e.clientX,e.clientY);});
    window.addEventListener('mouseup',endDrag);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    window.addEventListener('touchmove',e=>{if(dragging)moveDrag(e.touches[0].clientX,e.touches[0].clientY);});
    window.addEventListener('touchend',endDrag);

    function syncGlowSprites(){
      const quat=new THREE.Quaternion().setFromEuler(new THREE.Euler(globe.rotation.x,globe.rotation.y,globe.rotation.z,'XYZ'));
      pinMeshes.forEach(({glowSprite,site})=>{
        const base=ll2v(site.lat,site.lon,R),norm=base.clone().normalize();
        glowSprite.position.copy(base.clone().add(norm.multiplyScalar(.08)).applyQuaternion(quat));
      });
    }

    const rc=new THREE.Raycaster(),mv2=new THREE.Vector2();
    canvas.addEventListener('mouseup',e=>{
      if(moved)return;
      mv2.x=(e.clientX/W())*2-1;mv2.y=-(e.clientY/H())*2+1;
      rc.setFromCamera(mv2,camera);
      const hits=rc.intersectObjects(pinMeshes.map(p=>p.dot),false);
      if(hits.length){const pm=pinMeshes.find(p=>p.dot===hits[0].object);if(pm)openPanel(pm.site);}
      else if(!panel.contains(e.target))panel.classList.remove('open');
    });

    const SPIN=0.00028;
    function animate(t){
      requestAnimationFrame(animate);
      const ts=t*.001;
      if(window._sm)window._sm.uniforms.time.value=ts;
      globeMat.uniforms.time.value=ts;
      cloudMat.uniforms.time.value=ts;
      globeMat.uniforms.camPos.value.copy(camera.position);
      if(autoSpin){globe.rotation.y+=SPIN;pinGroup.rotation.y+=SPIN;syncGlowSprites();}
      else if(!dragging){
        vx*=.92;vy*=.92;
        globe.rotation.y+=vy;pinGroup.rotation.y+=vy;
        globe.rotation.x+=vx;pinGroup.rotation.x+=vx;
        syncGlowSprites();
        if(Math.abs(vx)<.00008&&Math.abs(vy)<.00008)autoSpin=true;
      }
      clouds.rotation.y+=SPIN*.70;
      pinMeshes.forEach(({glowSprite,phase})=>{
        const pulse=0.72+0.38*Math.abs(Math.sin(ts*.5+phase));
        glowSprite.material.opacity=pulse*.88;
        const sc=0.12+0.055*Math.abs(Math.sin(ts*.38+phase));
        glowSprite.scale.set(sc,sc,1);
      });
      renderer.render(scene,camera);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
