    "imports": {

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#060d18;font-family:'Inter',sans-serif;color:#e9f0ff;}
    #c{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;cursor:grab;}
    #c:active{cursor:grabbing;}
    nav{position:fixed;top:0;left:0;right:0;z-index:30;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 48px;height:68px;pointer-events:auto;}
    .nav-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;
      letter-spacing:.06em;color:rgba(220,232,255,.9);text-decoration:none;}
    .nav-links{display:flex;align-items:center;gap:4px;}
    .nav-links a{font-size:13px;font-weight:400;letter-spacing:.13em;text-transform:uppercase;
      color:rgba(160,190,255,.5);text-decoration:none;padding:7px 16px;border-radius:4px;
      transition:color .25s,background .25s;}
    .nav-links a:hover,.nav-links a.active{color:rgba(220,235,255,.9);background:rgba(100,140,255,.08);}
    .nav-links .divider{color:rgba(100,130,200,.2);font-size:13px;user-select:none;}
    .panel{position:fixed;top:50%;right:3vw;
      transform:translateY(-50%) translateX(calc(100% + 40px));
      z-index:40;width:340px;padding:28px 30px 26px;border-radius:18px;
      background:linear-gradient(135deg,rgba(8,16,48,.88) 0%,rgba(6,12,38,.94) 100%);
      border:1px solid rgba(100,130,220,.18);
      box-shadow:0 8px 48px rgba(0,0,0,.8),inset 0 1px 0 rgba(160,190,255,.05);
      backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
      transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .35s;
      opacity:0;pointer-events:none;}
    .panel.open{transform:translateY(-50%) translateX(0);opacity:1;pointer-events:auto;}
    .panel-close{position:absolute;top:14px;right:16px;background:none;border:none;cursor:pointer;
      font-size:18px;color:rgba(160,185,255,.4);transition:color .2s;line-height:1;}
    .panel-close:hover{color:rgba(220,235,255,.85);}
    .pcb{width:36px;height:3px;border-radius:2px;margin-bottom:14px;}
    .pew{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(140,170,255,.45);margin-bottom:8px;}
    .ptitle{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;line-height:1.25;color:#ddeeff;margin-bottom:6px;}
    .porg{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(140,170,220,.38);margin-bottom:5px;}
    .pdate{font-size:10px;letter-spacing:.12em;color:rgba(130,155,220,.32);margin-bottom:14px;display:block;}
    .prule{width:36px;height:1px;background:linear-gradient(90deg,rgba(140,170,255,.35),transparent);margin-bottom:14px;}
    .pbody{font-size:12.5px;font-weight:300;line-height:1.78;color:rgba(190,210,255,.58);}
    .pbody ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;}
    .pbody ul li::before{content:'— ';color:rgba(140,170,255,.3);}
    .plinks{margin-top:16px;display:flex;flex-direction:column;gap:5px;}
    .plinks a{font-size:11px;letter-spacing:.1em;color:rgba(140,180,255,.5);text-decoration:none;
      border-bottom:1px solid rgba(140,180,255,.12);align-self:flex-start;transition:color .2s;}
    .plinks a:hover{color:rgba(210,225,255,.9);}
    .hud{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
      z-index:20;text-align:center;pointer-events:none;}
    .hud h2{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:rgba(220,235,255,.7);}
    .hud h2 em{font-style:italic;color:rgba(190,210,255,.65);}
    .hud p{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(140,165,220,.35);margin-top:4px;}
    .coords{position:fixed;bottom:28px;left:48px;z-index:20;
      font-size:10px;letter-spacing:.18em;color:rgba(110,130,190,.25);pointer-events:none;}
    .tagline{position:fixed;bottom:28px;right:48px;z-index:20;
      font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(110,130,190,.25);pointer-events:none;}
    .hint{position:fixed;top:calc(68px + 18px);left:50%;transform:translateX(-50%);
      font-size:10px;letter-spacing:.2em;text-transform:uppercase;
      color:rgba(160,185,255,.3);z-index:20;pointer-events:none;transition:opacity 1.2s;}
  </style>

<body>

  <div class="panel" id="panel">
    <button class="panel-close" id="pClose">&times;</button>
    <div class="pcb" id="pBar"></div>
    <div class="pew" id="pEye"></div>
    <div class="ptitle" id="pTit"></div>
    <div class="porg" id="pOrg"></div>
    <span class="pdate" id="pDat"></span>

  <div class="hud"><h2>Where the <em>work happened.</em></h2><p>drag to explore &nbsp;·&nbsp; click a pin</p></div>
  <div class="hint" id="hint">drag to rotate</div>
  <div class="coords">41.3083&deg; N &nbsp;72.9279&deg; W</div>
  <div class="tagline">science as an explorable universe</div>

  <script type="module">
    import * as THREE from 'three';

    const SITES=[
      {id:'yale',lat:41.31,lon:-72.93,color:new THREE.Color(0x78c8ff),
       eyebrow:'Neuroscience · Neurodegeneration',
       title:'Locus Coeruleus Degeneration in Parkinson\u2019s Disease',
       org:'Higley Lab · Yale School of Medicine',date:'Feb 2026 – Present',
       bullets:['Characterizing LC axon degeneration in PPT1-deficient mice via IHC.',
                'Investigating norepinephrine dysfunction as an early Parkinson\u2019s marker.'],links:[]},
      {id:'msu',lat:42.72,lon:-84.48,color:new THREE.Color(0x64f0a0),
       eyebrow:'Top-Down Proteomics · Mass Spectrometry',
       title:'Novel SPME-CZE-MS System for Mass-Limited Proteomics',
       org:'Sun Lab · Michigan State University',date:'Jun – Aug 2024',
       bullets:['Built a novel SPME–CZE–MS/MS system for top-down proteomics.',
                'Increased injection capacity ~30× vs. standard CZE-MS.'],links:[]},
      {id:'stanford',lat:37.43,lon:-122.17,color:new THREE.Color(0xffc864),
       eyebrow:'Drosophila Genetics · Molecular Biology',
       title:'Enhancer-Trap Line Development & P-Element Mapping',
       org:'Stan-X Lab · Stanford University',date:'Aug 2024 – Jun 2025',
       bullets:['Developed enhancer-trapped Drosophila line via LexA-LexAop system.',
                'Mapped P-element insertion to CG11050 via inverse PCR & FlyBase BLAST.'],links:[]},
      {id:'fermilab',lat:41.84,lon:-88.27,color:new THREE.Color(0xc88cff),
       eyebrow:'Astrophysics · Machine Learning',
       title:'CNN Classification of Gravitational Lens Morphologies',
       org:'Fermi National Accelerator Lab · Quarknet',date:'Jun – Aug 2023',
       bullets:['Generated two 40,000-image datasets of double-source plane lenses.',
                'Trained CNNs (PyTorch) for automated morphological classification.'],
       links:[{label:'AGU Annual Meeting →',href:'https://agu.confex.com/agu/fm23/meetingapp.cgi/Paper/1438256'},
              {label:'Fermilab/Quarknet Workshop →',href:'https://doi.org/10.2172/2006481'}]}
    ];

    const W=()=>window.innerWidth, H=()=>window.innerHeight;

    const canvas=document.getElementById('c');
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(W(),H());
    renderer.setClearColor(0x060d18,1);

    const scene=new THREE.Scene();
    // camera pulled back: globe appears ~15% smaller
    const camera=new THREE.PerspectiveCamera(38,W()/H(),0.1,500);
    camera.position.set(0,0,3.4);
    camera.lookAt(0,0,0);

    window.addEventListener('resize',()=>{
      camera.aspect=W()/H();
      camera.updateProjectionMatrix();
      renderer.setSize(W(),H());
    });

    /* ---- STARS ---- */
    {
      const N=9000,p=new Float32Array(N*3),ph=new Float32Array(N),sp=new Float32Array(N),sz=new Float32Array(N);
      for(let i=0;i<N;i++){
        const u=Math.random()*Math.PI*2,v=Math.acos(2*Math.random()-1),r=80+Math.random()*120;
        p[i*3]=r*Math.sin(v)*Math.cos(u);p[i*3+1]=r*Math.sin(v)*Math.sin(u);p[i*3+2]=r*Math.cos(v);
        ph[i]=Math.random()*Math.PI*2;sp[i]=.0015+Math.random()*.005;sz[i]=.6+Math.random()*1.6;
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('phase',new THREE.BufferAttribute(ph,1));
      g.setAttribute('speed',new THREE.BufferAttribute(sp,1));
      g.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
      const sm=new THREE.ShaderMaterial({
        uniforms:{time:{value:0}},
        vertexShader:`attribute float aSize,phase,speed;uniform float time;varying float vB;
          void main(){float r=abs(sin(time*speed+phase));vB=.65+.35*pow(r,.3);
          vec4 mv=modelViewMatrix*vec4(position,1.);float sb=1.+4.*max(0.,r-.72)/.28;
          gl_PointSize=aSize*sb*(300./-mv.z);gl_Position=projectionMatrix*mv;}`,
        fragmentShader:`varying float vB;void main(){
          vec2 uv=gl_PointCoord-.5;float d=length(uv);if(d>.5)discard;
          float c=1.-smoothstep(0.,.44,d);gl_FragColor=vec4(vec3(.76,.88,1.)*vB,c*vB);}`,
        transparent:true,depthWrite:false});
      scene.add(new THREE.Points(g,sm));window._sm=sm;
    }

    /* ---- LIGHTING ---- */
    scene.add(new THREE.AmbientLight(0x1a2a4a,2.5));
    const sun=new THREE.DirectionalLight(0xfff0e0,3.0);
    sun.position.set(4,2,3);scene.add(sun);
    scene.add(Object.assign(new THREE.DirectionalLight(0x4466bb,0.8),{position:new THREE.Vector3(-4,1,-2)}));

    /* ---- TEXTURES ---- */
    const TL=new THREE.TextureLoader();
    const dayTex  =TL.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
    const cloudTex=TL.load('https://unpkg.com/three-globe/example/img/earth-clouds.png');

    /* ---- STYLIZED GLOBE SHADER ----
      Keeps the real geography shape (from the texture as a land/ocean mask)
      but recolours with a dreamy illustrated palette:
        oceans  → deep indigo -> bright cerulean based on diffuse
        land    → warm sage-green -> golden highlight
      Cel-shaded diffuse band + soft specular shimmer on ocean.
      Shadow side fades to deep violet-blue (no harsh night texture).
    ---- */
    const R=1.0;
    const globeMat=new THREE.ShaderMaterial({
      uniforms:{
        dayMap:{value:dayTex},
        sunDir:{value:sun.position.clone().normalize()},
        time:  {value:0},
      },
      vertexShader:`
        varying vec2 vUv;
        varying vec3 vNorm;
        varying vec3 vViewDir;
        void main(){
          vUv=uv;
          vNorm=normalize(normalMatrix*normal);
          vec4 mv=modelViewMatrix*vec4(position,1.);
          vViewDir=normalize(-mv.xyz);
          gl_Position=projectionMatrix*mv;
        }`,
      fragmentShader:`
        uniform sampler2D dayMap;
        uniform vec3 sunDir;
        uniform float time;
        varying vec2 vUv;
        varying vec3 vNorm;
        varying vec3 vViewDir;

        // Simple hash for subtle noise
        float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
        float noise(vec2 p){
          vec2 i=floor(p),f=fract(p);
          f=f*f*(3.-2.*f);
          return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
                     mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
        }

        void main(){
          vec3 raw=texture2D(dayMap,vUv).rgb;

          // detect ocean vs land by blue dominance in the texture
          float isOcean=smoothstep(0.05,0.35, raw.b - max(raw.r,raw.g)*0.7);

          // subtle uv-based noise for painterly variation
          float n=noise(vUv*18.)*0.08+noise(vUv*42.)*0.04;

          // diffuse
          float diff=clamp(dot(vNorm,normalize(sunDir)),0.,1.);
          // cel-band: smooth two-step
          float cel=smoothstep(0.0,0.45,diff)*0.6+smoothstep(0.45,0.9,diff)*0.4;

          // OCEAN colours: deep indigo night → rich cerulean → bright sky-blue highlight
          vec3 oceanDark =vec3(0.04,0.06,0.22);
          vec3 oceanMid  =vec3(0.08,0.25,0.62);
          vec3 oceanLight=vec3(0.28,0.65,0.95);
          vec3 ocean=mix(oceanDark, mix(oceanMid,oceanLight,smoothstep(0.4,1.0,cel)), cel);

          // LAND colours: muted violet-shadow → sage-green → warm ivory highlight
          vec3 landDark =vec3(0.07,0.07,0.18);
          vec3 landMid  =vec3(0.22,0.38,0.24);
          vec3 landLight=vec3(0.72,0.68,0.48);
          vec3 land=mix(landDark, mix(landMid,landLight,smoothstep(0.3,0.95,cel)), cel);

          // ICE / snow caps: white tinted blue
          float isIce=smoothstep(0.78,0.95, dot(raw,vec3(0.33)))*(1.-isOcean);
          vec3 ice=mix(vec3(0.75,0.82,1.0),vec3(1.),cel);

          vec3 col=mix(land,ocean,isOcean);
          col=mix(col,ice,isIce);
          col+=n*(isOcean*0.04+0.02); // painterly grain

          // soft specular shimmer on ocean (Blinn)
          float spec=pow(clamp(dot(normalize(vNorm),normalize(sunDir+vViewDir)),0.,1.),32.);
          col+=isOcean*spec*0.22*vec3(0.6,0.8,1.0);

          // atmospheric limb darkening
          float rim=1.-clamp(dot(vNorm,vViewDir),0.,1.);
          col=mix(col, vec3(0.04,0.06,0.24), pow(rim,3.5)*0.55);

          gl_FragColor=vec4(col,1.);
        }`,
    });
    const globe=new THREE.Mesh(new THREE.SphereGeometry(R,128,128),globeMat);
    scene.add(globe);

    /* ---- CLOUDS (lighter, dreamier) ---- */
    const clouds=new THREE.Mesh(
      new THREE.SphereGeometry(R*1.008,128,128),
      new THREE.MeshPhongMaterial({
        map:cloudTex,transparent:true,opacity:0.22,
        color:new THREE.Color(0xdde8ff),
        blending:THREE.NormalBlending,depthWrite:false}));
    scene.add(clouds);

    /* ---- ATMOSPHERE (wider, dreamier glow) ---- */
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(R*1.08,64,64),
      new THREE.ShaderMaterial({
        uniforms:{c:{value:new THREE.Color(0x2255dd)}},
        vertexShader:`varying vec3 vN;
          void main(){vN=normalize(normalMatrix*normal);
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
        fragmentShader:`uniform vec3 c;varying vec3 vN;
          void main(){
            float edge=1.-clamp(dot(vN,vec3(0.,0.,1.)),0.,1.);
            float f=pow(edge,2.8);
            gl_FragColor=vec4(c,f*0.55);}`,
        side:THREE.BackSide,blending:THREE.AdditiveBlending,
        transparent:true,depthWrite:false})));

    /* ---- lat/lon helper ---- */
    function ll2v(lat,lon,r){
      const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
      return new THREE.Vector3(
        -r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    }

    /* ---- PINS ---- */
    const pinMeshes=[],pinGroup=new THREE.Group();
    scene.add(pinGroup);
    SITES.forEach((s,i)=>{
      const pos=ll2v(s.lat,s.lon,R);
      const spike=new THREE.Mesh(new THREE.CylinderGeometry(0.003,0.010,0.085,8),new THREE.MeshBasicMaterial({color:s.color}));
      const dot=new THREE.Mesh(new THREE.SphereGeometry(0.020,16,16),new THREE.MeshBasicMaterial({color:s.color}));
      dot.position.y=0.052;
      const halo=new THREE.Mesh(new THREE.RingGeometry(0.026,0.034,32),
        new THREE.MeshBasicMaterial({color:s.color,side:THREE.DoubleSide,transparent:true,opacity:.8,depthWrite:false}));
      halo.position.y=0.054;
      const halo2=new THREE.Mesh(new THREE.RingGeometry(0.034,0.042,32),
        new THREE.MeshBasicMaterial({color:s.color,side:THREE.DoubleSide,transparent:true,opacity:.3,depthWrite:false}));
      halo2.position.y=0.054;
      const grp=new THREE.Group();
      grp.add(spike,dot,halo,halo2);
      grp.position.copy(pos);
      grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),pos.clone().normalize());
      pinGroup.add(grp);
      pinMeshes.push({grp,dot,halo,halo2,site:s,phase:i*1.4});
    });

    /* ---- PANEL ---- */
    const panel=document.getElementById('panel');
    document.getElementById('pClose').addEventListener('click',()=>panel.classList.remove('open'));
    function openPanel(s){
      document.getElementById('pBar').style.background='#'+s.color.getHexString();
      document.getElementById('pEye').textContent=s.eyebrow;
      document.getElementById('pTit').textContent=s.title;
      document.getElementById('pOrg').textContent=s.org;
      document.getElementById('pDat').textContent=s.date;
      const ul=document.createElement('ul');
      s.bullets.forEach(b=>{const li=document.createElement('li');li.textContent=b;ul.appendChild(li);});
      const bd=document.getElementById('pBod');bd.innerHTML='';bd.appendChild(ul);
      const lk=document.getElementById('pLnk');lk.innerHTML='';
      s.links.forEach(l=>{const a=document.createElement('a');a.href=l.href;a.target='_blank';a.textContent=l.label;lk.appendChild(a);});
      panel.classList.add('open');
    }

    /* ---- DRAG / INERTIA ---- */
    let dragging=false,px=0,py=0,vx=0,vy=0,autoSpin=true,moved=false;
    const hintEl=document.getElementById('hint');let hintGone=false;
    function startDrag(x,y){dragging=true;px=x;py=y;autoSpin=false;moved=false;
      if(!hintGone){hintEl.style.opacity='0';hintGone=true;}}
    function moveDrag(x,y){if(!dragging)return;moved=true;
      const dx=x-px,dy=y-py;px=x;py=y;
      vx=dy*.006;vy=dx*.006;
      globe.rotation.y+=vy;pinGroup.rotation.y+=vy;
      globe.rotation.x+=vx;pinGroup.rotation.x+=vx;}
    function endDrag(){dragging=false;}
    canvas.addEventListener('mousedown',e=>startDrag(e.clientX,e.clientY));
    window.addEventListener('mousemove',e=>{if(dragging)moveDrag(e.clientX,e.clientY);});
    window.addEventListener('mouseup',endDrag);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    window.addEventListener('touchmove',e=>{if(dragging)moveDrag(e.touches[0].clientX,e.touches[0].clientY);});
    window.addEventListener('touchend',endDrag);

    /* ---- RAYCAST ---- */
    const rc=new THREE.Raycaster(),mv2=new THREE.Vector2();
    canvas.addEventListener('mouseup',e=>{
      if(moved)return;
      mv2.x=(e.clientX/W())*2-1;mv2.y=-(e.clientY/H())*2+1;
      rc.setFromCamera(mv2,camera);
      const hits=rc.intersectObjects(pinMeshes.map(p=>p.dot),false);
      if(hits.length){const pm=pinMeshes.find(p=>p.dot===hits[0].object);if(pm)openPanel(pm.site);}
      else if(!panel.contains(e.target))panel.classList.remove('open');
    });

    /* ---- ANIMATE ---- */
    function animate(t){
      requestAnimationFrame(animate);
      if(window._sm)window._sm.uniforms.time.value=t*.001;
      globeMat.uniforms.time.value=t*.001;
      if(autoSpin){globe.rotation.y+=.0006;pinGroup.rotation.y+=.0006;}
      else if(!dragging){
        vx*=.90;vy*=.90;
        globe.rotation.y+=vy;pinGroup.rotation.y+=vy;
        globe.rotation.x+=vx;pinGroup.rotation.x+=vx;
        if(Math.abs(vx)<.0001&&Math.abs(vy)<.0001)autoSpin=true;
      }
      clouds.rotation.y+=.00006;
      pinMeshes.forEach(({halo,halo2,phase})=>{
        const s1=0.85+0.55*Math.abs(Math.sin(t*.0022+phase));
        halo.scale.setScalar(s1);
        halo.material.opacity=0.35+0.45*Math.abs(Math.sin(t*.0022+phase));
        const s2=1.0+0.6*Math.abs(Math.sin(t*.0014+phase+1.0));
        halo2.scale.setScalar(s2);
        halo2.material.opacity=0.12+0.18*Math.abs(Math.sin(t*.0014+phase+1.0));
      });
      renderer.render(scene,camera);
    }
    requestAnimationFrame(animate);
  </script>
</body>
