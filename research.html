<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research — Sofia Grimm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#060d18;font-family:'Inter',sans-serif;color:#e9f0ff;}
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .nebula{
      position:fixed;inset:0;z-index:1;pointer-events:none;
      background:
        radial-gradient(ellipse 55% 38% at 15% 55%, rgba(40,70,180,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 45% 32% at 82% 28%, rgba(30,80,200,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 44% at 50% 50%, rgba(20,40,120,0.05) 0%, transparent 65%);
    }
    nav{
      position:fixed;top:0;left:0;right:0;z-index:30;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 48px;height:68px;
    }
    .nav-name{
      font-family:'Cormorant Garamond',serif;
      font-size:28px;font-weight:300;font-style:italic;
      letter-spacing:0.06em;color:rgba(220,232,255,0.9);text-decoration:none;
    }
    .nav-links{display:flex;align-items:center;gap:4px;}
    .nav-links a{
      font-size:13px;font-weight:400;letter-spacing:0.13em;text-transform:uppercase;
      color:rgba(160,190,255,0.5);text-decoration:none;padding:7px 16px;border-radius:4px;
      transition:color .25s,background .25s;
    }
    .nav-links a:hover,.nav-links a.active{color:rgba(220,235,255,0.9);background:rgba(100,140,255,0.08);}
    .nav-links .divider{color:rgba(100,130,200,0.2);font-size:13px;user-select:none;}

    /* ── MAP WRAPPER ── */
    .map-wrap{
      position:fixed;inset:0;z-index:10;
      display:flex;align-items:center;justify-content:center;
      padding-top:68px;
    }
    .map-svg-wrap{
      position:relative;
      width:92vw;max-width:1100px;
    }
    .map-svg-wrap svg{
      width:100%;height:auto;display:block;
      filter:drop-shadow(0 0 32px rgba(40,80,200,0.08));
    }

    /* ── MAP TITLE ── */
    .map-title{
      position:absolute;top:-42px;left:0;
      font-family:'Cormorant Garamond',serif;
      font-size:38px;font-weight:300;color:#eef3ff;
      pointer-events:none;
    }
    .map-title em{font-style:italic;color:rgba(190,210,255,0.8);}
    .map-hint{
      position:absolute;top:-14px;left:2px;
      font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
      color:rgba(140,170,255,0.38);pointer-events:none;
    }

    /* ── PINS ── */
    .pin-group{cursor:pointer;}
    .pin-group .pin-ring{
      fill:none;stroke-width:1;
      transform-origin:center;
      animation:pinPulse 2.6s ease-in-out infinite;
    }
    .pin-group .pin-dot{
      transition:r .2s;
    }
    .pin-group:hover .pin-dot{r:6;}
    @keyframes pinPulse{
      0%,100%{r:10;opacity:.5;}
      50%{r:18;opacity:0;}
    }
    /* per-color pulse rings – set via stroke attr on the element */

    /* ── CONNECTOR LINES ── */
    .conn-line{
      stroke-width:0.6;
      stroke-dasharray:3 4;
      opacity:0.18;
      animation:lineDash 3s linear infinite;
    }
    @keyframes lineDash{
      from{stroke-dashoffset:0}to{stroke-dashoffset:-28}
    }

    /* ── PANEL ── */
    .panel{
      position:fixed;top:50%;right:3vw;
      transform:translateY(-50%) translateX(120%);
      z-index:40;
      width:340px;
      padding:28px 30px 26px;
      border-radius:18px;
      background:linear-gradient(135deg,rgba(8,16,48,0.80) 0%,rgba(6,12,38,0.88) 100%);
      border:1px solid rgba(100,130,220,0.16);
      box-shadow:0 8px 48px rgba(0,0,0,0.7),0 0 40px rgba(30,60,180,0.07),inset 0 1px 0 rgba(160,190,255,0.05);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .3s;
      opacity:0;pointer-events:none;
    }
    .panel.open{
      transform:translateY(-50%) translateX(0);
      opacity:1;pointer-events:auto;
    }
    .panel-close{
      position:absolute;top:14px;right:16px;
      background:none;border:none;cursor:pointer;
      font-size:16px;color:rgba(160,185,255,0.4);
      transition:color .2s;
      font-family:'Inter',sans-serif;
      line-height:1;
    }
    .panel-close:hover{color:rgba(220,235,255,0.8);}
    .panel-eyebrow{
      font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
      color:rgba(140,170,255,0.45);margin-bottom:8px;
    }
    .panel-title{
      font-family:'Cormorant Garamond',serif;
      font-size:22px;font-weight:300;line-height:1.2;
      color:#ddeeff;margin-bottom:6px;
    }
    .panel-org{
      font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
      color:rgba(140,170,220,0.38);margin-bottom:14px;
    }
    .panel-date{
      font-size:10px;letter-spacing:0.12em;
      color:rgba(130,155,220,0.32);margin-bottom:14px;
      display:block;
    }
    .panel-rule{
      width:36px;height:1px;
      background:linear-gradient(90deg,rgba(140,170,255,0.35),transparent);
      margin-bottom:14px;
    }
    .panel-body{
      font-size:12.5px;font-weight:300;line-height:1.75;
      color:rgba(190,210,255,0.58);
    }
    .panel-body ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;}
    .panel-body ul li::before{content:'— ';color:rgba(140,170,255,0.3);}
    .panel-links{margin-top:16px;display:flex;flex-direction:column;gap:5px;}
    .panel-links a{
      font-size:11px;letter-spacing:0.1em;
      color:rgba(140,180,255,0.50);text-decoration:none;
      border-bottom:1px solid rgba(140,180,255,0.12);
      align-self:flex-start;transition:color .2s;
    }
    .panel-links a:hover{color:rgba(210,225,255,0.9);}

    .coords{
      position:fixed;bottom:32px;left:48px;z-index:20;

      color:rgba(110,130,190,0.28);font-weight:300;pointer-events:none;

    .tagline{

  <script type="module">
    import('https://unpkg.com/three@0.161.0/build/three.module.js').then(THREE=>{
      const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(window.innerWidth,window.innerHeight);
      renderer.setClearColor(0x060d18,1);
      document.body.appendChild(renderer.domElement);
      const scene=new THREE.Scene();
      const camera=new THREE.PerspectiveCamera(36,window.innerWidth/window.innerHeight,0.1,500);
      camera.position.set(0,0,46);camera.lookAt(0,0,0);
      window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
      const N=6000,pos=new Float32Array(N*3),ph=new Float32Array(N),sp=new Float32Array(N),sz=new Float32Array(N);
      for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*220;pos[i*3+1]=(Math.random()-.5)*160;pos[i*3+2]=-Math.random()*260;ph[i]=Math.random()*Math.PI*2;sp[i]=.002+Math.random()*.004;sz[i]=.08+Math.random()*.16;}
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      geo.setAttribute('phase',new THREE.BufferAttribute(ph,1));
      geo.setAttribute('speed',new THREE.BufferAttribute(sp,1));
      geo.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
      const mat=new THREE.ShaderMaterial({uniforms:{time:{value:0}},vertexShader:`attribute float aSize;attribute float phase;attribute float speed;uniform float time;varying float vB;void main(){float r=abs(sin(time*speed+phase));vB=.6+.4*pow(r,.4);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(1.+1.5*max(0.,r-.8)/.2)*(300./-mv.z);gl_Position=projectionMatrix*mv;}`,fragmentShader:`varying float vB;void main(){vec2 uv=gl_PointCoord-vec2(.5);if(length(uv)>.5)discard;float c=1.-smoothstep(0.,.45,length(uv));gl_FragColor=vec4(vec3(.75,.88,1.)*vB,c*vB*.6);}`,transparent:true,depthWrite:false});
      scene.add(new THREE.Points(geo,mat));
      (function loop(t){requestAnimationFrame(loop);mat.uniforms.time.value=t*.001;renderer.render(scene,camera);})(0);
    });
  </script>

      }
    };

    const panel = document.getElementById('panel');
    const panelClose = document.getElementById('panelClose');

    document.querySelectorAll('.pin-group').forEach(pin => {
      pin.addEventListener('click', e => {
        const d = data[pin.dataset.id];
        if(!d) return;
        document.getElementById('pEyebrow').textContent = d.eyebrow;
        document.getElementById('pTitle').textContent = d.title;
        document.getElementById('pOrg').textContent = d.org;
        document.getElementById('pDate').textContent = d.date;
        const ul = document.createElement('ul');
        d.bullets.forEach(b => { const li = document.createElement('li'); li.textContent = b; ul.appendChild(li); });
        const body = document.getElementById('pBody');
        body.innerHTML = '';
        body.appendChild(ul);
        const linksEl = document.getElementById('pLinks');
        linksEl.innerHTML = '';
        d.links.forEach(l => {
          const a = document.createElement('a');
          a.href = l.href; a.target = '_blank'; a.textContent = l.label;
          linksEl.appendChild(a);
        });
        panel.classList.add('open');
        e.stopPropagation();
      });
    });

    panelClose.addEventListener('click', () => panel.classList.remove('open'));
    document.addEventListener('click', e => {
      if(!panel.contains(e.target)) panel.classList.remove('open');
    });
  </script>
</body>
</html>
