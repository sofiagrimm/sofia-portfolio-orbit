  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#07061a;font-family:'Inter',sans-serif;color:#e9f0ff;}

    .porg{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(160,150,220,.38);margin-bottom:5px;}
    .pdate{font-size:10px;letter-spacing:.12em;color:rgba(140,130,220,.32);margin-bottom:14px;display:block;}
    .prule{width:36px;height:1px;background:linear-gradient(90deg,rgba(160,140,255,.35),transparent);margin-bottom:14px;}
    .pbody{font-size:12.5px;font-weight:300;line-height:1.78;color:rgba(200,195,255,.55);}
    .pbody ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;}
    .pbody ul li::before{content:'— ';color:rgba(160,140,255,.3);}
    .plinks{margin-top:16px;display:flex;flex-direction:column;gap:5px;}
    .plinks a{font-size:11px;letter-spacing:.1em;color:rgba(160,150,255,.5);text-decoration:none;
      border-bottom:1px solid rgba(160,150,255,.12);align-self:flex-start;transition:color .2s;}
    .plinks a:hover{color:rgba(220,215,255,.9);}
    .hud{
      position:fixed;
      left:48px;
      top:50%;
      transform:translateY(-50%);
      z-index:20;
      text-align:left;
      pointer-events:none;
      padding:22px 28px 20px;
      border-radius:16px;
      background:linear-gradient(135deg,rgba(10,8,40,.55) 0%,rgba(7,6,28,.60) 100%);
      border:1px solid rgba(160,140,255,.14);
      box-shadow:0 4px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(200,185,255,.07);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }
    .hud h2{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:rgba(225,218,255,.82);line-height:1.2;}
    .hud h2 em{font-style:italic;color:rgba(200,190,255,.70);}
    .hud p{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(160,148,220,.45);margin-top:10px;
      padding-top:10px;border-top:1px solid rgba(160,140,255,.10);}
    .coords{position:fixed;bottom:28px;left:48px;z-index:20;

      font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(120,110,190,.25);pointer-events:none;}

  <script type="module">
    import * as THREE from 'three';

    const SITES=[
      {id:'yale',lat:41.31,lon:-72.93,color:new THREE.Color(0x78c8ff),
       eyebrow:'Neuroscience · Neurodegeneration',
       title:'Locus Coeruleus Degeneration in Parkinson\u2019s Disease',
       org:'Higley Lab · Yale School of Medicine',date:'Feb 2026 – Present',
       bullets:['Characterizing LC axon degeneration in PPT1-deficient mice via IHC.',
                'Investigating norepinephrine dysfunction as an early Parkinson\u2019s marker.'],links:[]},
      {id:'msu',lat:42.72,lon:-84.48,color:new THREE.Color(0x64f0a0),
       eyebrow:'Top-Down Proteomics · Mass Spectrometry',
       title:'Novel SPME-CZE-MS System for Mass-Limited Proteomics',
       org:'Sun Lab · Michigan State University',date:'Jun – Aug 2024',
       bullets:['Built a novel SPME–CZE–MS/MS system for top-down proteomics.',
                'Increased injection capacity ~30× vs. standard CZE-MS.'],links:[]},
      {id:'stanford',lat:37.43,lon:-122.17,color:new THREE.Color(0xffc864),
       eyebrow:'Drosophila Genetics · Molecular Biology',
       title:'Enhancer-Trap Line Development & P-Element Mapping',
       org:'Stan-X Lab · Stanford University',date:'Aug 2024 – Jun 2025',
       bullets:['Developed enhancer-trapped Drosophila line via LexA-LexAop system.',
                'Mapped P-element insertion to CG11050 via inverse PCR & FlyBase BLAST.'],links:[]},
      {id:'fermilab',lat:41.84,lon:-88.27,color:new THREE.Color(0xc88cff),
       eyebrow:'Astrophysics · Machine Learning',
       title:'CNN Classification of Gravitational Lens Morphologies',
       org:'Fermi National Accelerator Lab · Quarknet',date:'Jun – Aug 2023',
       bullets:['Generated two 40,000-image datasets of double-source plane lenses.',
                'Trained CNNs (PyTorch) for automated morphological classification.'],
       links:[{label:'AGU Annual Meeting →',href:'https://agu.confex.com/agu/fm23/meetingapp.cgi/Paper/1438256'},
              {label:'Fermilab/Quarknet Workshop →',href:'https://doi.org/10.2172/2006481'}]}
    ];

    const W=()=>window.innerWidth, H=()=>window.innerHeight;

    const canvas=document.getElementById('c');
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(W(),H());
    renderer.setClearColor(0x07061a,1);
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=1.1;

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(38,W()/H(),0.1,500);
    camera.position.set(0,0,3.6);
    camera.lookAt(0,0,0);

    window.addEventListener('resize',()=>{
      camera.aspect=W()/H();
      camera.updateProjectionMatrix();
      renderer.setSize(W(),H());
    });

    /* ---- NEBULA BACKGROUND SPRITE ---- */
    {
      const nebCanvas=document.createElement('canvas');
      nebCanvas.width=512; nebCanvas.height=512;
      const ctx=nebCanvas.getContext('2d');
      const g1=ctx.createRadialGradient(256,256,0,256,256,256);
      g1.addColorStop(0,'rgba(80,50,160,0.18)');
      g1.addColorStop(0.4,'rgba(50,30,120,0.10)');
      g1.addColorStop(0.75,'rgba(20,10,60,0.05)');
      g1.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g1; ctx.fillRect(0,0,512,512);
      const g2=ctx.createRadialGradient(280,230,0,280,230,180);
      g2.addColorStop(0,'rgba(120,80,200,0.10)');
      g2.addColorStop(0.5,'rgba(60,30,140,0.05)');
      g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.fillRect(0,0,512,512);
      const nebTex=new THREE.CanvasTexture(nebCanvas);
      const nebSprite=new THREE.Sprite(new THREE.SpriteMaterial({
        map:nebTex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
      nebSprite.scale.set(8,8,1);
      nebSprite.position.set(0,0,-2);
      scene.add(nebSprite);
    }

    /* ---- STARS ---- */
    {
      const N=10000;
      const p=new Float32Array(N*3),ph=new Float32Array(N),sp=new Float32Array(N),sz=new Float32Array(N),col=new Float32Array(N*3);
      const starColors=[[.82,.88,1],[.9,.82,1],[1,.92,.82],[.78,.90,1]];
      for(let i=0;i<N;i++){
        const u=Math.random()*Math.PI*2, v=Math.acos(2*Math.random()-1);
        const r=80+Math.random()*120;
        p[i*3]  =r*Math.sin(v)*Math.cos(u);
        p[i*3+1]=r*Math.sin(v)*Math.sin(u);
        p[i*3+2]=r*Math.cos(v);
        ph[i]=Math.random()*Math.PI*2;
        sp[i]=.0015+Math.random()*.005;
        sz[i]=.5+Math.random()*1.8;
        const c=starColors[Math.floor(Math.random()*starColors.length)];
        col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('phase',  new THREE.BufferAttribute(ph,1));
      g.setAttribute('speed',  new THREE.BufferAttribute(sp,1));
      g.setAttribute('aSize',  new THREE.BufferAttribute(sz,1));
      g.setAttribute('aColor', new THREE.BufferAttribute(col,3));
      const sm=new THREE.ShaderMaterial({
        uniforms:{time:{value:0}},
        vertexShader:`
          attribute float aSize,phase,speed;
          attribute vec3 aColor;
          uniform float time; varying float vB; varying vec3 vCol;
          void main(){
            float r=abs(sin(time*speed+phase));
            vB=.55+.45*pow(r,.3);
            vCol=aColor;
            vec4 mv=modelViewMatrix*vec4(position,1.);
            float sb=1.+5.*max(0.,r-.70)/.30;
            gl_PointSize=aSize*sb*(280./-mv.z);
            gl_Position=projectionMatrix*mv;
          }`,
        fragmentShader:`
          varying float vB; varying vec3 vCol;
          void main(){
            vec2 uv=gl_PointCoord-.5; float d=length(uv);
            if(d>.5)discard;
            float c=1.-smoothstep(0.,.42,d);
            float spike=max(0.,1.-abs(uv.x)*12.)*max(0.,1.-abs(uv.y)*12.)*.25;
            gl_FragColor=vec4(vCol*vB,(c+spike)*vB);
          }`,
        transparent:true,depthWrite:false
      });
      scene.add(new THREE.Points(g,sm));
      window._sm=sm;
    }

    /* ---- LIGHTING ---- */
    scene.add(new THREE.AmbientLight(0x2a1e5c,1.4));
    const sun=new THREE.DirectionalLight(0xffe8d0,2.6);
    sun.position.set(5,2,4); scene.add(sun);
    const rimL=new THREE.DirectionalLight(0x6644cc,0.8);
    rimL.position.set(-5,1,-3); scene.add(rimL);
    const fillL=new THREE.DirectionalLight(0x221144,0.4);
    fillL.position.set(0,-4,-2); scene.add(fillL);

    /* ---- TEXTURES ---- */
    const TL=new THREE.TextureLoader();
    const dayTex  =TL.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
    const nightTex=TL.load('https://unpkg.com/three-globe/example/img/earth-night.jpg');
    const cloudTex=TL.load('https://unpkg.com/three-globe/example/img/earth-clouds.png');

    /* ---- GLOBE ---- */
    const R=1.0;
    const globeMat=new THREE.ShaderMaterial({
      uniforms:{
        dayMap:   {value:dayTex},
        nightMap: {value:nightTex},
        sunDir:   {value:sun.position.clone().normalize()},
        time:     {value:0},
        camPos:   {value:camera.position.clone()},
      },
      vertexShader:`
        varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorldPos;
        void main(){
          vUv=uv;
          vNormal=normalize(normalMatrix*normal);
          vec4 wp=modelMatrix*vec4(position,1.);
          vWorldPos=wp.xyz;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
        }`,
      fragmentShader:`
        uniform sampler2D dayMap,nightMap;
        uniform vec3 sunDir,camPos;
        uniform float time;
        varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorldPos;
        float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
        float noise(vec2 p){
          vec2 i=floor(p); vec2 f=fract(p); f=f*f*(3.-2.*f);
          return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
                     mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
        }
        void main(){
          vec3 day  =texture2D(dayMap,  vUv).rgb;
          vec3 night=texture2D(nightMap,vUv).rgb*2.0;
          vec3 sDir=normalize(sunDir);
          float cosA=dot(vNormal,sDir);
          float blend=smoothstep(-0.14,0.20,cosA);
          vec3 col=mix(night,day,blend);
          col*=0.55+0.45*max(0.,cosA);
          float rch=day.r; float bch=day.b;
          float isOcean=smoothstep(0.0,0.18,bch-rch)*smoothstep(0.05,0.25,bch);
          vec3 viewDir=normalize(camPos-vWorldPos);
          vec3 halfV=normalize(sDir+viewDir);
          float spec=pow(max(0.,dot(vNormal,halfV)),120.)*isOcean*max(0.,cosA);
          float shimmer=noise(vUv*80.+vec2(time*.18,time*.12));
          shimmer=smoothstep(.55,.75,shimmer)*isOcean*max(0.,cosA)*.06;
          col+=vec3(.8,.88,1.)*spec*.55;
          col+=vec3(.9,.95,1.)*shimmer;
          col=mix(col, col+vec3(.04,.02,.10)*blend, .35);
          gl_FragColor=vec4(col,1.);
        }`,
    });
    const globe=new THREE.Mesh(new THREE.SphereGeometry(R,128,128),globeMat);
    scene.add(globe);

    /* ---- CLOUDS ---- */
    const cloudMat=new THREE.ShaderMaterial({
      uniforms:{
        cloudMap:{value:cloudTex},
        time:{value:0},
        sunDir:{value:sun.position.clone().normalize()},
      },
      vertexShader:`
        varying vec2 vUv; varying vec3 vNormal;
        void main(){
          vUv=uv; vNormal=normalize(normalMatrix*normal);
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
        }`,
      fragmentShader:`
        uniform sampler2D cloudMap;
        uniform float time; uniform vec3 sunDir;
        varying vec2 vUv; varying vec3 vNormal;
        void main(){
          vec2 uv2=vUv+vec2(time*.0003,0.);
          float alpha=texture2D(cloudMap,uv2).r;
          float cosA=dot(vNormal,normalize(sunDir));
          vec3 litCol =vec3(1.0,0.97,0.92);
          vec3 darkCol =vec3(.55,.58,.72);
          vec3 col=mix(darkCol,litCol,smoothstep(-.1,.4,cosA));
          float pulse=.92+.08*sin(time*.0008+vUv.x*40.);
          gl_FragColor=vec4(col*pulse,alpha*.62);
        }`,
      transparent:true,depthWrite:false,blending:THREE.NormalBlending,side:THREE.FrontSide
    });
    const clouds=new THREE.Mesh(new THREE.SphereGeometry(R*1.012,128,128),cloudMat);
    scene.add(clouds);

    /* ---- ATMOSPHERE ---- */
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.12,64,64),new THREE.ShaderMaterial({
      vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec3 vN;void main(){float e=1.-clamp(dot(vN,vec3(0.,0.,1.)),0.,1.);float f=pow(e,4.5);gl_FragColor=vec4(.55,.42,1.,f*0.18);}`,
      side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false})));
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.048,64,64),new THREE.ShaderMaterial({
      vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec3 vN;void main(){float e=1.-clamp(dot(vN,vec3(0.,0.,1.)),0.,1.);float f=pow(e,3.0);gl_FragColor=vec4(.28,.48,1.,f*0.38);}`,
      side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false})));
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.022,64,64),new THREE.ShaderMaterial({
      vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying vec3 vN;void main(){float e=1.-clamp(dot(vN,vec3(0.,0.,1.)),0.,1.);float f=pow(e,6.0);gl_FragColor=vec4(.72,.84,1.,f*0.55);}`,
      side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false})));

    /* ---- lat/lon helper ---- */
    function ll2v(lat,lon,r){
      const phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
      return new THREE.Vector3(
        -r*Math.sin(phi)*Math.cos(theta),
         r*Math.cos(phi),
         r*Math.sin(phi)*Math.sin(theta));
    }

    /* ---- GLOW SPRITE TEXTURE ---- */
    function makeGlowTex(hex){
      const c=document.createElement('canvas'); c.width=128; c.height=128;
      const ctx=c.getContext('2d');
      const col=new THREE.Color(hex);
      const r=Math.round(col.r*255),g=Math.round(col.g*255),b=Math.round(col.b*255);
      const grd=ctx.createRadialGradient(64,64,0,64,64,64);
      grd.addColorStop(0,  `rgba(${r},${g},${b},0.90)`);
      grd.addColorStop(0.18,`rgba(${r},${g},${b},0.60)`);
      grd.addColorStop(0.45,`rgba(${r},${g},${b},0.18)`);
      grd.addColorStop(1,  `rgba(${r},${g},${b},0)`);
      ctx.fillStyle=grd; ctx.fillRect(0,0,128,128);
      return new THREE.CanvasTexture(c);
    }

    /* ---- PINS ---- */
    const pinMeshes=[],pinGroup=new THREE.Group();
    scene.add(pinGroup);
    SITES.forEach((s,i)=>{
      const pos=ll2v(s.lat,s.lon,R);
      const norm=pos.clone().normalize();
      const spike=new THREE.Mesh(
        new THREE.CylinderGeometry(0.0015,0.007,0.07,6),
        new THREE.MeshBasicMaterial({color:s.color}));
      const dot=new THREE.Mesh(
        new THREE.SphereGeometry(0.018,16,16),
        new THREE.MeshBasicMaterial({color:s.color}));
      dot.position.y=0.046;
      const glowTex=makeGlowTex(s.color.getHex());
      const glowSprite=new THREE.Sprite(new THREE.SpriteMaterial({
        map:glowTex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:.9}));
      glowSprite.scale.set(0.16,0.16,1);
      const grp=new THREE.Group();
      grp.add(spike,dot);
      grp.position.copy(pos);
      grp.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),norm);
      pinGroup.add(grp);
      const glowWorld=pos.clone().add(norm.clone().multiplyScalar(0.08));
      glowSprite.position.copy(glowWorld);
      scene.add(glowSprite);
      pinMeshes.push({grp,dot,glowSprite,site:s,phase:i*1.4});
    });

    /* ---- PANEL ---- */
    const panel=document.getElementById('panel');
    document.getElementById('pClose').addEventListener('click',()=>panel.classList.remove('open'));
    function openPanel(s){
      document.getElementById('pBar').style.background='#'+s.color.getHexString();
      document.getElementById('pEye').textContent=s.eyebrow;
      document.getElementById('pTit').textContent=s.title;
      document.getElementById('pOrg').textContent=s.org;
      document.getElementById('pDat').textContent=s.date;
      const ul=document.createElement('ul');
      s.bullets.forEach(b=>{const li=document.createElement('li');li.textContent=b;ul.appendChild(li);});
      const bd=document.getElementById('pBod');bd.innerHTML='';bd.appendChild(ul);
      const lk=document.getElementById('pLnk');lk.innerHTML='';
      s.links.forEach(l=>{const a=document.createElement('a');a.href=l.href;a.target='_blank';a.textContent=l.label;lk.appendChild(a);});
      panel.classList.add('open');
    }

    /* ---- DRAG / INERTIA ---- */
    let dragging=false,px=0,py=0,vx=0,vy=0,autoSpin=true,moved=false;
    function startDrag(x,y){dragging=true;px=x;py=y;autoSpin=false;moved=false;}
    function moveDrag(x,y){if(!dragging)return;moved=true;
      const dx=x-px,dy=y-py;px=x;py=y;
      vx=dy*.005;vy=dx*.005;
      globe.rotation.y+=vy;pinGroup.rotation.y+=vy;
      globe.rotation.x+=vx;pinGroup.rotation.x+=vx;
      syncGlowSprites();
    }
    function endDrag(){dragging=false;}
    canvas.addEventListener('mousedown',e=>startDrag(e.clientX,e.clientY));
    window.addEventListener('mousemove',e=>{if(dragging)moveDrag(e.clientX,e.clientY);});
    window.addEventListener('mouseup',endDrag);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    window.addEventListener('touchmove',e=>{if(dragging)moveDrag(e.touches[0].clientX,e.touches[0].clientY);});
    window.addEventListener('touchend',endDrag);

    /* ---- sync glow sprites ---- */
    function syncGlowSprites(){
      const euler=new THREE.Euler(globe.rotation.x,globe.rotation.y,globe.rotation.z,'XYZ');
      const quat=new THREE.Quaternion().setFromEuler(euler);
      pinMeshes.forEach(({glowSprite,site})=>{
        const base=ll2v(site.lat,site.lon,R);
        const norm=base.clone().normalize();
        const wp=base.clone().add(norm.clone().multiplyScalar(0.08)).applyQuaternion(quat);
        glowSprite.position.copy(wp);
      });
    }

    /* ---- RAYCAST ---- */
    const rc=new THREE.Raycaster(),mv2=new THREE.Vector2();
    canvas.addEventListener('mouseup',e=>{
      if(moved)return;
      mv2.x=(e.clientX/W())*2-1;mv2.y=-(e.clientY/H())*2+1;
      rc.setFromCamera(mv2,camera);
      const hits=rc.intersectObjects(pinMeshes.map(p=>p.dot),false);
      if(hits.length){const pm=pinMeshes.find(p=>p.dot===hits[0].object);if(pm)openPanel(pm.site);}
      else if(!panel.contains(e.target))panel.classList.remove('open');
    });

    /* ---- ANIMATE ---- */
    const SPIN=0.00035;
    function animate(t){
      requestAnimationFrame(animate);
      const ts=t*.001;
      if(window._sm)window._sm.uniforms.time.value=ts;
      globeMat.uniforms.time.value=ts;
      cloudMat.uniforms.time.value=ts;
      globeMat.uniforms.camPos.value.copy(camera.position);
      if(autoSpin){globe.rotation.y+=SPIN;pinGroup.rotation.y+=SPIN;syncGlowSprites();}
      else if(!dragging){
        vx*=.92;vy*=.92;
        globe.rotation.y+=vy;pinGroup.rotation.y+=vy;
        globe.rotation.x+=vx;pinGroup.rotation.x+=vx;
        syncGlowSprites();
        if(Math.abs(vx)<.00008&&Math.abs(vy)<.00008)autoSpin=true;
      }
      clouds.rotation.y+=SPIN*.8;
      pinMeshes.forEach(({glowSprite,phase})=>{
        const pulse=0.75+0.35*Math.abs(Math.sin(ts*.55+phase));
        glowSprite.material.opacity=pulse*0.85;
        const sc=0.13+0.05*Math.abs(Math.sin(ts*.4+phase));
        glowSprite.scale.set(sc,sc,1);
      });
      renderer.render(scene,camera);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
