<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sofia Grimm — Science as an Explorable Landscape</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    body{
      background:#07111b;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
      color:#e9f0ff;
    }
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .ui{position:fixed;inset:0;z-index:10;pointer-events:none}
    .center-pill{
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);
      pointer-events:auto;
      display:inline-flex;align-items:center;
      padding:18px 36px;
      border-radius:999px;
      background:radial-gradient(circle at 20% 10%,rgba(40,58,100,0.92) 0,rgba(6,12,26,0.97) 100%);
      border:1px solid rgba(140,175,255,0.18);
      box-shadow:0 0 0 1px rgba(100,140,255,0.06),0 24px 64px rgba(0,0,0,0.9);
      backdrop-filter:blur(22px);
      white-space:nowrap;
    }
    .pill-text{display:flex;flex-direction:column}
    .pill-text h1{font-size:28px;font-weight:600;letter-spacing:.02em;color:#f4f7ff}
    .pill-text p{font-size:14px;margin-top:5px;color:rgba(190,210,255,0.65)}
  </style>
</head>
<body>
  <div class="ui">
    <div class="center-pill">
      <div class="pill-text">
        <h1>welcome to sofia's world</h1>
        <p>a tiny solar system of things i care about</p>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x07111b, 1);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 0, 46);
    camera.lookAt(0, 0, 0);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x0d1a33, 1.4));
    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(18, 24, 18);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xaac4ff, 1.2);
    rim.position.set(-24, 4, -20);
    scene.add(rim);

    const STAR_COUNT = 9000;
    const starPositions = new Float32Array(STAR_COUNT * 3);
    const starPhase     = new Float32Array(STAR_COUNT);
    const starSpeed     = new Float32Array(STAR_COUNT);
    const starSize      = new Float32Array(STAR_COUNT);

    for (let i = 0; i < STAR_COUNT; i++) {
      starPositions[i*3]   = (Math.random() - 0.5) * 220;
      starPositions[i*3+1] = (Math.random() - 0.5) * 160;
      starPositions[i*3+2] = -Math.random() * 260;
      starPhase[i] = Math.random() * Math.PI * 2;
      // faster twinkle speeds
      starSpeed[i] = 0.002 + Math.random() * 0.005;
      // bigger sizes
      starSize[i]  = 0.12 + Math.random() * 0.22;
    }

    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeo.setAttribute('phase',    new THREE.BufferAttribute(starPhase, 1));
    starGeo.setAttribute('speed',    new THREE.BufferAttribute(starSpeed, 1));
    starGeo.setAttribute('aSize',    new THREE.BufferAttribute(starSize,  1));

    const starMat = new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 } },
      vertexShader: `
        attribute float aSize;
        attribute float phase;
        attribute float speed;
        uniform float time;
        varying float vBright;
        varying float vRaw;
        void main() {
          float raw = abs(sin(time * speed + phase));
          vRaw = raw;
          // very bright baseline - pow < 1 pushes everything toward 1
          vBright = 0.7 + 0.3 * pow(raw, 0.3);
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          // dramatic size boost at peak
          float spikeBoost = 1.0 + 3.5 * max(0.0, raw - 0.75) / 0.25;
          gl_PointSize = aSize * spikeBoost * (340.0 / -mvPos.z);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        varying float vBright;
        varying float vRaw;
        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          float d = length(uv);
          if (d > 0.5) discard;

          float core = 1.0 - smoothstep(0.0, 0.42, d);
          // wider soft halo
          float halo = 0.35 * exp(-d * 7.0);

          // 4-point diffraction spikes, trigger earlier and stronger
          float spike = 0.0;
          float spikeThresh = 0.6;
          if (vRaw > spikeThresh) {
            float spikeStr = (vRaw - spikeThresh) / (1.0 - spikeThresh);
            float ax = abs(uv.x);
            float ay = abs(uv.y);
            float hSpike = exp(-ay * 20.0) * exp(-ax * 4.0) * max(0.0, 1.0 - d * 1.8);
            float vSpike = exp(-ax * 20.0) * exp(-ay * 4.0) * max(0.0, 1.0 - d * 1.8);
            spike = max(hSpike, vSpike) * spikeStr * 1.2;
          }

          float alpha = clamp(core + halo + spike, 0.0, 1.0) * vBright;
          vec3 col = mix(vec3(0.75, 0.88, 1.0), vec3(1.0, 0.98, 0.85), spike * 0.8);
          gl_FragColor = vec4(col, alpha);
        }
      `,
      transparent: true,
      depthWrite: false
    });

    scene.add(new THREE.Points(starGeo, starMat));

    // orbit ring
    const orbitRing = new THREE.Mesh(
      new THREE.RingGeometry(13.4, 14.0, 180),
      new THREE.MeshBasicMaterial({ color: 0x4a5878, side: THREE.DoubleSide, transparent: true, opacity: 0.22 })
    );
    orbitRing.position.set(0, 0, -18);
    scene.add(orbitRing);

    function makeRingTexture(glowBase) {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 1;
      const ctx = c.getContext('2d');
      const grad = ctx.createLinearGradient(0,0,256,0);
      grad.addColorStop(0,    glowBase.replace('1)', '0.0)'));
      grad.addColorStop(0.08, glowBase.replace('1)', '0.7)'));
      grad.addColorStop(0.4,  glowBase.replace('1)', '0.5)'));
      grad.addColorStop(0.65, glowBase.replace('1)', '0.3)'));
      grad.addColorStop(1,    glowBase.replace('1)', '0.0)'));
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,256,1);
      return new THREE.CanvasTexture(c);
    }

    const configs = [
      { color: 0xddeeff, emissive: 0x0a1828, glow: 'rgba(160,210,255,', ringColor: 'rgba(160,210,255,1)', ringTilt: { x: 0.42, z:  0.18 } },
      { color: 0xd8f0ff, emissive: 0x081420, glow: 'rgba(100,200,255,', ringColor: 'rgba(100,200,255,1)', ringTilt: { x: 0.50, z: -0.14 } },
      { color: 0xeeddff, emissive: 0x120d26, glow: 'rgba(180,140,255,', ringColor: 'rgba(200,160,255,1)', ringTilt: { x: 0.32, z:  0.28 } },
      { color: 0xd8fce8, emissive: 0x061810, glow: 'rgba(100,240,160,', ringColor: 'rgba(100,240,160,1)', ringTilt: { x: 0.46, z:  0.08 } },
      { color: 0xfff0cc, emissive: 0x1e1005, glow: 'rgba(255,210,100,', ringColor: 'rgba(255,220,120,1)', ringTilt: { x: 0.38, z: -0.22 } }
    ];

    const R = 14.0;
    const Z = -18;
    const SPEED = 0.0004;
    const sphereGeo = new THREE.SphereGeometry(1.9, 64, 64);
    const groups = [];

    for (let i = 0; i < 5; i++) {
      const cfg = configs[i];

      const mat = new THREE.MeshStandardMaterial({
        color: cfg.color,
        emissive: cfg.emissive,
        emissiveIntensity: 0.18,
        metalness: 0.18,
        roughness: 0.3
      });

      const gc = document.createElement('canvas');
      gc.width = gc.height = 128;
      const ctx = gc.getContext('2d');
      const grad = ctx.createRadialGradient(64,64,0,64,64,64);
      grad.addColorStop(0,   cfg.glow + '0.6)');
      grad.addColorStop(0.4, cfg.glow + '0.18)');
      grad.addColorStop(1,   cfg.glow + '0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,128,128);
      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(gc), transparent: true, depthWrite: false })
      );
      sprite.scale.set(5.8, 5.8, 1);

      const ringGeo = new THREE.RingGeometry(2.6, 4.0, 128);
      const pos = ringGeo.attributes.position;
      const uv  = ringGeo.attributes.uv;
      const v3  = new THREE.Vector3();
      for (let j = 0; j < pos.count; j++) {
        v3.fromBufferAttribute(pos, j);
        uv.setXY(j, (v3.length() - 2.6) / (4.0 - 2.6), 0.5);
      }
      const planetRing = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
        map: makeRingTexture(cfg.ringColor),
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.78,
        depthWrite: false
      }));
      planetRing.rotation.x = cfg.ringTilt.x;
      planetRing.rotation.z = cfg.ringTilt.z;

      const group = new THREE.Group();
      group.add(new THREE.Mesh(sphereGeo, mat));
      group.add(sprite);
      group.add(planetRing);
      group.userData.angleOffset = i * (2 * Math.PI / 5);

      const initAngle = group.userData.angleOffset;
      group.position.set(Math.cos(initAngle) * R, Math.sin(initAngle) * R, Z);

      scene.add(group);
      groups.push(group);
    }

    let lastTime = performance.now();
    let orbitAngle = 0;

    function animate(time) {
      requestAnimationFrame(animate);
      const t = time ?? performance.now();
      const dt = t - lastTime;
      lastTime = t;

      orbitAngle += SPEED * dt;
      starMat.uniforms.time.value = t * 0.001;

      for (const group of groups) {
        const a = orbitAngle + group.userData.angleOffset;
        group.position.set(Math.cos(a) * R, Math.sin(a) * R, Z);
      }

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
