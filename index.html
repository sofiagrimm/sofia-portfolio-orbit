<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sofia Grimm — Science as an Explorable Landscape</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <style>
    :root{
      --bg:#07111b;
      --bg-2:#0b1825;
      --surface:rgba(10,18,28,0.72);
      --border:rgba(140,175,255,0.13);
      --text:#e9f0ff;
      --muted:rgba(200,212,255,0.55);
      --accent:#5fc8ff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      margin:0;overflow:hidden;
      background:radial-gradient(circle at 10% 0%,#1e2d4a 0,var(--bg) 55%,#01020a 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
    }
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .ui{position:fixed;inset:0;z-index:10;pointer-events:none}
    .center-pill{
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);
      pointer-events:auto;
      display:inline-flex;align-items:center;gap:14px;
      padding:13px 24px;
      border-radius:999px;
      background:radial-gradient(circle at 20% 10%,rgba(40,58,100,0.9) 0,rgba(8,14,30,0.96) 100%);
      border:1px solid var(--border);
      box-shadow:0 0 0 1px rgba(100,140,255,0.06),0 20px 60px rgba(0,0,0,0.85);
      backdrop-filter:blur(20px);
      white-space:nowrap;
    }
    .pill-text{display:flex;flex-direction:column}
    .pill-text h1{font-size:19px;font-weight:600;letter-spacing:.02em;color:#f4f7ff}
    .pill-text p{font-size:11.5px;margin-top:3px;color:rgba(190,210,255,0.7)}
  </style>
</head>
<body>
  <div class="ui">
    <div class="center-pill">
      <div class="pill-text">
        <h1>welcome to sofia's world</h1>
        <p>a tiny solar system of things i care about</p>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const W = window.innerWidth, H = window.innerHeight;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W, H);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(36, W / H, 0.1, 500);
    camera.position.set(0, 0, 46);
    camera.lookAt(0, 0, 0);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // lighting
    scene.add(new THREE.AmbientLight(0x0d1a33, 1.2));
    const key = new THREE.DirectionalLight(0xffffff, 0.85);
    key.position.set(18, 24, 18);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xaac4ff, 1.1);
    rim.position.set(-24, 4, -20);
    scene.add(rim);

    // starfield
    {
      const n = 9000;
      const p = new Float32Array(n * 3);
      for (let i = 0; i < n; i++) {
        p[i*3]   = (Math.random() - 0.5) * 220;
        p[i*3+1] = (Math.random() - 0.5) * 160;
        p[i*3+2] = -Math.random() * 260;
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(p, 3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({
        color: 0xbfd5ff, size: 0.028, transparent: true, opacity: 0.8
      })));
    }

    // orbit ring
    scene.add(Object.assign(
      new THREE.Mesh(
        new THREE.RingGeometry(21.4, 22.0, 180),
        new THREE.MeshBasicMaterial({ color: 0x4a5878, side: THREE.DoubleSide, transparent: true, opacity: 0.2 })
      ),
      { position: new THREE.Vector3(0, 0, -18) }
    ));

    const configs = [
      { color: 0xf2f8ff, emissive: 0x0e1825 },
      { color: 0xc8eeff, emissive: 0x091524 },
      { color: 0xf0e2ff, emissive: 0x130e26 },
      { color: 0xdffce8, emissive: 0x061810 },
      { color: 0xfff0d8, emissive: 0x1e1005 }
    ];

    const R = 22.0;
    const Z = -18;
    const sphereGeo = new THREE.SphereGeometry(1.2, 64, 64);

    for (let i = 0; i < 5; i++) {
      const angle = i * (2 * Math.PI / 5);
      const x = Math.cos(angle) * R;
      const y = Math.sin(angle) * R;

      const mat = new THREE.MeshStandardMaterial({
        color: configs[i].color,
        emissive: configs[i].emissive,
        emissiveIntensity: 0.15,
        metalness: 0.22,
        roughness: 0.34
      });

      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0,   'rgba(180,210,255,0.55)');
      grad.addColorStop(0.4, 'rgba(120,170,255,0.18)');
      grad.addColorStop(1,   'rgba(60,100,200,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);
      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, depthWrite: false })
      );
      sprite.scale.set(3.6, 3.6, 1);

      const group = new THREE.Group();
      group.position.set(x, y, Z);
      group.add(new THREE.Mesh(sphereGeo, mat));
      group.add(sprite);
      scene.add(group);
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
