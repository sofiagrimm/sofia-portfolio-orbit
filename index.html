<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sofia Grimm</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    body{background:#060d18;font-family:'Inter',sans-serif;color:#e9f0ff;}
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .nebula{
      position:fixed;inset:0;z-index:1;pointer-events:none;
      background:
        radial-gradient(ellipse 55% 38% at 15% 55%, rgba(40,70,180,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 45% 32% at 82% 28%, rgba(30,80,200,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 38% 28% at 50% 82%, rgba(0,100,90,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 50% 44% at 50% 50%, rgba(20,40,120,0.06) 0%, transparent 65%);
      animation:nebulaDrift 24s ease-in-out infinite alternate;
    }
    @keyframes nebulaDrift{
      0%{opacity:.75;transform:scale(1) translateY(0)}
      100%{opacity:1;transform:scale(1.05) translateY(-14px)}
    }
    nav{
      position:fixed;top:0;left:0;right:0;z-index:20;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 48px;height:68px;pointer-events:auto;
    }
    .nav-name{
      font-family:'Cormorant Garamond',serif;
      font-size:28px;font-weight:300;font-style:italic;
      letter-spacing:0.06em;color:rgba(220,232,255,0.9);text-decoration:none;
    }
    .nav-links{display:flex;align-items:center;gap:4px;}
    .nav-links a{
      font-size:13px;font-weight:400;letter-spacing:0.13em;text-transform:uppercase;
      color:rgba(160,190,255,0.5);text-decoration:none;padding:7px 16px;border-radius:4px;
      transition:color .25s,background .25s;
    }
    .nav-links a:hover,.nav-links a.active{color:rgba(220,235,255,0.9);background:rgba(100,140,255,0.08);}
    .nav-links .divider{color:rgba(100,130,200,0.2);font-size:13px;user-select:none;}
    .ui{position:fixed;inset:0;z-index:10;pointer-events:none}
    .center-card{
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);
      pointer-events:auto;
      display:flex;flex-direction:column;align-items:center;
      text-align:center;padding:44px 32px 40px;border-radius:28px;
      background:linear-gradient(135deg,rgba(8,16,45,0.65) 0%,rgba(6,14,38,0.72) 60%,rgba(8,14,42,0.60) 100%);
      border:1px solid rgba(100,130,220,0.12);
      box-shadow:0 0 0 1px rgba(60,90,180,0.06),0 8px 40px rgba(0,0,0,0.60),0 0 50px rgba(30,60,160,0.06),inset 0 1px 0 rgba(160,190,255,0.06);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    }
    .card-eyebrow{
      font-size:13px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;
      color:rgba(160,185,255,0.55);margin-bottom:18px;
    }
    .card-title{
      font-family:'Cormorant Garamond',serif;
      font-size:52px;font-weight:300;line-height:1.1;letter-spacing:0.01em;color:#eef3ff;
    }
    .card-title em{font-style:italic;color:rgba(190,210,255,0.85);}
    .card-rule{
      width:52px;height:1px;
      background:linear-gradient(90deg,transparent,rgba(140,170,255,0.35),transparent);
      margin:22px auto;
    }
    .card-sub{
      font-size:12px;font-weight:300;letter-spacing:0.18em;text-transform:uppercase;
      color:rgba(150,170,220,0.40);
    }
    .card-ring{
      position:fixed;left:50%;top:50%;
      transform:translate(-50%,-50%);
      width:620px;height:620px;border-radius:50%;
      border:1px solid rgba(90,110,200,0.07);
      pointer-events:none;z-index:9;
      animation:cardRingSpin 70s linear infinite;
    }
    .card-ring::before{
      content:'';position:absolute;inset:-1px;border-radius:50%;
      border:1px solid rgba(80,100,180,0.04);transform:scale(1.14);
    }
    @keyframes cardRingSpin{
      from{transform:translate(-50%,-50%) rotate(0deg)}
      to{transform:translate(-50%,-50%) rotate(360deg)}
    }
    .coords{
      position:fixed;bottom:32px;left:48px;z-index:20;
      font-size:10px;letter-spacing:0.18em;
      color:rgba(110,130,190,0.28);font-weight:300;pointer-events:none;
    }
    .tagline{
      position:fixed;bottom:32px;right:48px;z-index:20;
      font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
      color:rgba(110,130,190,0.28);font-weight:300;pointer-events:none;
    }
    #planetHint{
      position:fixed;z-index:30;pointer-events:none;
      font-size:11px;letter-spacing:.12em;text-transform:uppercase;
      color:rgba(200,220,255,0.75);
      background:rgba(8,14,40,0.72);backdrop-filter:blur(8px);
      border:1px solid rgba(120,150,255,0.18);
      padding:6px 12px;border-radius:20px;
      opacity:0;transition:opacity .18s;
      white-space:nowrap;
    }
    #popupOverlay{
      position:fixed;inset:0;z-index:40;
      background:rgba(4,8,28,0);
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;
      transition:background .35s;
    }
    #popupOverlay.visible{
      background:rgba(4,8,28,0.55);
      pointer-events:auto;
    }
    #popupBox{
      position:relative;
      width:min(480px,90vw);
      background:linear-gradient(135deg,rgba(8,16,52,0.92) 0%,rgba(6,12,38,0.96) 100%);
      border:1px solid rgba(120,150,255,0.20);
      border-radius:22px;
      padding:40px 36px 36px;
      box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 60px rgba(60,100,255,0.08),inset 0 1px 0 rgba(180,200,255,0.06);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      opacity:0;
      transform:scale(0.82) translateY(22px);
      transition:opacity .38s cubic-bezier(.22,1,.36,1), transform .38s cubic-bezier(.22,1,.36,1);
    }
    #popupOverlay.visible #popupBox{
      opacity:1;
      transform:scale(1) translateY(0);
    }
    #popupClose{
      position:absolute;top:16px;right:16px;
      width:32px;height:32px;border-radius:50%;
      background:rgba(100,130,220,0.12);border:1px solid rgba(120,150,255,0.18);
      color:rgba(180,200,255,0.7);font-size:16px;line-height:32px;text-align:center;
      cursor:pointer;transition:background .18s,color .18s;
      display:flex;align-items:center;justify-content:center;
    }
    #popupClose:hover{background:rgba(100,130,220,0.28);color:#fff;}
    .popup-accent{
      display:inline-block;width:8px;height:8px;border-radius:50%;
      margin-bottom:14px;
    }
    .popup-label{
      font-size:10px;letter-spacing:.22em;text-transform:uppercase;
      color:rgba(150,175,255,0.45);margin-bottom:10px;
    }
    .popup-title{
      font-family:'Cormorant Garamond',serif;
      font-size:32px;font-weight:300;line-height:1.15;color:#eef3ff;
      margin-bottom:16px;
    }
    .popup-rule{
      width:36px;height:1px;
      background:linear-gradient(90deg,rgba(140,170,255,0.4),transparent);
      margin-bottom:16px;
    }
    .popup-body{
      font-size:13px;font-weight:300;line-height:1.8;color:rgba(200,218,255,0.62);
    }
    .popup-body strong{font-weight:500;color:rgba(220,232,255,0.88);}

    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }
      nav { padding: 0 20px; height: 58px; }
      .nav-name { font-size: 22px; }
      .nav-links a { font-size: 10px; padding: 5px 8px; letter-spacing: 0.10em; }
      .nav-links .divider { display: none; }
      .card-ring { display: none; }
      .ui { position: relative; min-height: 100svh; display: flex; align-items: center; justify-content: center; padding: 80px 20px 80px; }
      .center-card { position: relative; left: auto; top: auto; transform: none; width: 100%; max-width: 340px; padding: 32px 24px 28px; border-radius: 20px; }
      .card-eyebrow { font-size: 11px; margin-bottom: 14px; }
      .card-title { font-size: 36px; }
      .card-rule { margin: 16px auto; }
      .card-sub { font-size: 11px; }
      .coords { left: 20px; bottom: 20px; }
      .tagline { right: 20px; bottom: 20px; font-size: 9px; }
      #popupBox { padding: 28px 22px 24px; }
      .popup-title { font-size: 26px; }
      .popup-body { font-size: 12px; }
    }
  </style>
</head>

    // Build a high-resolution Earth texture on canvas using detailed continent polygons
    // Coordinates are [lon, lat] in degrees; mapped to equirectangular UV
    function buildEarthTexture() {
      const W = 2048, H = 1024;
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const ctx = c.getContext('2d');

      // Deep ocean
      const oceanGrad = ctx.createLinearGradient(0,0,0,H);
      oceanGrad.addColorStop(0,   '#0a1a3a');
      oceanGrad.addColorStop(0.5, '#0d2244');
      oceanGrad.addColorStop(1,   '#091830');
      ctx.fillStyle = oceanGrad;
      ctx.fillRect(0, 0, W, H);

      // Convert lon/lat -> canvas x,y
      function p(lon, lat) {
        return [(lon + 180) / 360 * W, (90 - lat) / 180 * H];
      }

      function drawLand(polys, fill, stroke) {
        ctx.fillStyle = fill || '#2d5a3d';
        ctx.strokeStyle = stroke || '#3a7050';
        ctx.lineWidth = 0.8;
        for (const poly of polys) {
          ctx.beginPath();
          const first = p(poly[0][0], poly[0][1]);
          ctx.moveTo(first[0], first[1]);
          for (let i = 1; i < poly.length; i++) {
            const pt = p(poly[i][0], poly[i][1]);
            ctx.lineTo(pt[0], pt[1]);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }
      }

      const landFill   = '#263d2b';
      const landStroke = '#325040';
      const highlightFill   = '#2e4a33';

      // ── NORTH AMERICA ──────────────────────────────────────────────────────
      drawLand([[
        [-168,72],[-140,72],[-130,69],[-120,68],[-100,70],[-85,70],[-78,72],[-70,73],
        [-60,76],[-64,78],[-68,80],[-80,82],[-90,82],[-100,80],[-114,78],[-130,76],
        [-140,75],[-155,73],[-163,70],[-168,72]
      ]], landFill, landStroke); // Arctic Canada

      drawLand([[
        [-168,70],[-156,68],[-145,62],[-138,58],[-130,54],[-124,48],[-124,42],
        [-120,37],[-117,32],[-110,30],[-105,22],[-98,20],[-92,18],[-88,16],
        [-85,22],[-88,26],[-90,28],[-94,30],[-96,26],[-100,28],[-104,30],
        [-106,32],[-112,28],[-116,30],[-118,34],[-122,38],[-122,46],[-126,50],
        [-130,55],[-138,58],[-145,62],[-152,60],[-156,58],[-160,56],[-165,60],
        [-166,64],[-168,68],[-168,70]
      ]], landFill, landStroke); // Alaska + Pacific coast

      drawLand([[
        [-124,48],[-116,44],[-112,38],[-110,35],[-104,30],[-98,26],[-94,30],
        [-90,30],[-88,30],[-86,30],[-84,32],[-80,32],[-76,34],[-74,38],
        [-72,42],[-70,44],[-66,46],[-64,44],[-60,46],[-56,48],[-54,50],
        [-58,52],[-62,54],[-66,56],[-70,56],[-76,54],[-80,52],[-84,50],
        [-88,48],[-92,48],[-96,48],[-100,48],[-104,48],[-108,48],[-112,48],
        [-116,48],[-124,48]
      ]], landFill, landStroke); // Main US/Canada body

      drawLand([[
        [-117,32],[-110,30],[-105,25],[-100,22],[-96,20],[-92,18],[-90,20],
        [-92,24],[-96,28],[-100,30],[-104,32],[-110,30],[-117,32]
      ]], landFill, landStroke); // Mexico

      drawLand([[
        [-90,20],[-86,16],[-84,12],[-80,8],[-77,8],[-75,10],[-78,14],
        [-82,18],[-86,20],[-90,20]
      ]], landFill, landStroke); // Central America

      drawLand([[
        [-60,12],[-62,10],[-66,10],[-68,12],[-70,14],[-72,12],[-74,12],
        [-76,8],[-78,4],[-76,0],[-72,-2],[-68,-4],[-64,-4],[-60,0],

      // ── GREENLAND ──────────────────────────────────────────────────────────
      drawLand([[

      // ── EUROPE ─────────────────────────────────────────────────────────────
      drawLand([[

      // Scandinavian peninsula
      drawLand([[

      ]], landFill, landStroke);

      // Morocco/NW Africa coast detail
      drawLand([[[-6,36],[-4,36],[-2,36],[0,34],[2,32],[4,30],[4,28],[2,26],
        [0,24],[-2,22],[-4,20],[-6,18],[-8,16],[-10,16],[-12,16],[-14,16],
        [-16,16],[-18,16],[-18,20],[-16,22],[-14,24],[-12,24],[-10,22],
        [-8,22],[-6,26],[-4,28],[-2,30],[-2,32],[-4,34],[-6,36]
      ]], landFill, landStroke);

      // Madagascar
      drawLand([[[44,-12],[46,-14],[50,-16],[50,-20],[48,-24],[46,-26],[44,-24],
        [44,-20],[44,-16],[44,-12]
      ]], landFill, landStroke);

      // ── ASIA ───────────────────────────────────────────────────────────────
      drawLand([[
        [26,42],[30,42],[34,42],[38,40],[40,38],[42,36],[44,36],[46,38],
        [48,40],[50,42],[52,44],[56,44],[60,44],[64,40],[68,38],[70,36],
        [72,34],[74,34],[76,32],[78,30],[80,28],[82,28],[84,26],[86,26],
        [88,24],[90,22],[92,22],[94,20],[96,18],[98,18],[100,20],[102,18],
        [104,16],[104,12],[100,8],[100,4],[104,2],[106,2],[108,4],[110,4],
        [112,6],[114,8],[116,8],[118,8],[120,10],[122,12],[124,14],[126,16],
        [128,18],[130,20],[132,22],[134,24],[136,26],[138,28],[140,30],
        [140,32],[138,34],[136,36],[134,38],[132,40],[130,42],[128,44],
        [128,48],[126,50],[124,52],[122,54],[120,56],[118,58],[116,60],
        [114,62],[112,64],[110,66],[108,68],[106,70],[104,72],[100,72],

        for(var g=0;g<groups.length;g++){
          var group=groups[g];
          var a=orbitAngle+group.userData.angleOffset;
          group.position.set(Math.cos(a)*R,Math.sin(a)*R,Z);
          quat.setFromAxisAngle(group.userData.spinAxis,group.userData.spinSpeed*(dt/16));
          group.userData.innerGroup.quaternion.multiply(quat);
        }
        renderer.render(scene,camera);
      }
      requestAnimationFrame(animate);

    }).catch(function(err){console.error('Three.js load failed:',err);});
  })();
  </script>
</body>
