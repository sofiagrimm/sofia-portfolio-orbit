<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sofia Grimm — Science as an Explorable Landscape</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    body{
      background:#07111b;
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
      color:#e9f0ff;
    }
    canvas{display:block;position:fixed;inset:0;z-index:0}
    .ui{position:fixed;inset:0;z-index:10;pointer-events:none}
    .center-pill{
      position:absolute;left:50%;top:50%;
      transform:translate(-50%,-50%);
      pointer-events:auto;
      display:inline-flex;align-items:center;
      padding:18px 36px;
      border-radius:999px;
      background:radial-gradient(circle at 20% 10%,rgba(40,58,100,0.92) 0,rgba(6,12,26,0.97) 100%);
      border:1px solid rgba(140,175,255,0.18);
      box-shadow:0 0 0 1px rgba(100,140,255,0.06),0 24px 64px rgba(0,0,0,0.9);
      backdrop-filter:blur(22px);
      white-space:nowrap;
    }
    .pill-text{display:flex;flex-direction:column}
    .pill-text h1{font-size:28px;font-weight:600;letter-spacing:.02em;color:#f4f7ff}
    .pill-text p{font-size:14px;margin-top:5px;color:rgba(190,210,255,0.65)}
  </style>
</head>
<body>
  <div class="ui">
    <div class="center-pill">
      <div class="pill-text">
        <h1>welcome to sofia's world</h1>
        <p>a tiny solar system of things i care about</p>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x07111b, 1);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 0, 46);
    camera.lookAt(0, 0, 0);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x0d1a33, 1.4));
    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(18, 24, 18);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xaac4ff, 1.2);
    rim.position.set(-24, 4, -20);
    scene.add(rim);

    // starfield
    {
      const n = 9000;
      const p = new Float32Array(n * 3);
      for (let i = 0; i < n; i++) {
        p[i*3]   = (Math.random() - 0.5) * 220;
        p[i*3+1] = (Math.random() - 0.5) * 160;
        p[i*3+2] = -Math.random() * 260;
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(p, 3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({
        color: 0xbfd5ff, size: 0.03, transparent: true, opacity: 0.85
      })));
    }

    // orbit ring
    const ringMesh = new THREE.Mesh(
      new THREE.RingGeometry(13.4, 14.0, 180),
      new THREE.MeshBasicMaterial({ color: 0x4a5878, side: THREE.DoubleSide, transparent: true, opacity: 0.22 })
    );
    ringMesh.position.set(0, 0, -18);
    scene.add(ringMesh);

    // helper: procedural planet texture
    function makePlanetTexture(baseColor, stripeColor, size = 256) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, size, size);
      // horizontal bands
      for (let b = 0; b < 7; b++) {
        const y = (b / 7) * size;
        const h = size / 14;
        ctx.globalAlpha = 0.18 + Math.random() * 0.14;
        ctx.fillStyle = stripeColor;
        ctx.fillRect(0, y, size, h);
      }
      ctx.globalAlpha = 1;
      // subtle noise dots
      for (let d = 0; d < 400; d++) {
        ctx.globalAlpha = Math.random() * 0.08;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(Math.random()*size, Math.random()*size, Math.random()*1.5, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      return new THREE.CanvasTexture(c);
    }

    // helper: ring texture (radial fade with gaps)
    function makeRingTexture(innerCol, outerCol) {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 1;
      const ctx = c.getContext('2d');
      const grad = ctx.createLinearGradient(0,0,256,0);
      grad.addColorStop(0,    innerCol.replace('1)', '0.0)'));
      grad.addColorStop(0.05, innerCol);
      grad.addColorStop(0.3,  outerCol);
      grad.addColorStop(0.55, innerCol.replace('1)', '0.5)'));
      grad.addColorStop(0.75, outerCol.replace('1)', '0.7)'));
      grad.addColorStop(1,    outerCol.replace('1)', '0.0)'));
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,256,1);
      return new THREE.CanvasTexture(c);
    }

    const configs = [
      {
        color: 0xddeeff, emissive: 0x0a1828, glow: 'rgba(160,210,255,',
        texBase: '#b8d4f0', texStripe: '#7aaad8',
        ringInner: 'rgba(160,210,255,1)', ringOuter: 'rgba(100,160,220,1)',
        ringTilt: { x: 0.4, z: 0.2 }, hasRing: true
      },
      {
        color: 0xd8f0ff, emissive: 0x081420, glow: 'rgba(100,200,255,',
        texBase: '#a0c8e8', texStripe: '#5588bb',
        ringInner: 'rgba(120,190,255,1)', ringOuter: 'rgba(80,140,200,1)',
        ringTilt: { x: 0.5, z: -0.15 }, hasRing: false
      },
      {
        color: 0xeeddff, emissive: 0x120d26, glow: 'rgba(180,140,255,',
        texBase: '#c8a8e8', texStripe: '#9060c0',
        ringInner: 'rgba(200,160,255,1)', ringOuter: 'rgba(140,90,220,1)',
        ringTilt: { x: 0.3, z: 0.3 }, hasRing: true
      },
      {
        color: 0xd8fce8, emissive: 0x061810, glow: 'rgba(100,240,160,',
        texBase: '#90d8a8', texStripe: '#44aa70',
        ringInner: 'rgba(120,240,170,1)', ringOuter: 'rgba(60,180,110,1)',
        ringTilt: { x: 0.45, z: 0.1 }, hasRing: false
      },
      {
        color: 0xfff0cc, emissive: 0x1e1005, glow: 'rgba(255,210,100,',
        texBase: '#f0d890', texStripe: '#c8a040',
        ringInner: 'rgba(255,220,120,1)', ringOuter: 'rgba(200,160,60,1)',
        ringTilt: { x: 0.38, z: -0.22 }, hasRing: true
      }
    ];

    const R = 14.0;
    const Z = -18;
    const sphereGeo = new THREE.SphereGeometry(1.9, 64, 64);

    for (let i = 0; i < 5; i++) {
      const angle = i * (2 * Math.PI / 5);
      const x = Math.cos(angle) * R;
      const y = Math.sin(angle) * R;
      const cfg = configs[i];

      const mat = new THREE.MeshStandardMaterial({
        map: makePlanetTexture(cfg.texBase, cfg.texStripe),
        emissive: new THREE.Color(cfg.emissive),
        emissiveIntensity: 0.12,
        metalness: 0.1,
        roughness: 0.75
      });

      // glow sprite
      const gc = document.createElement('canvas');
      gc.width = gc.height = 128;
      const ctx = gc.getContext('2d');
      const grad = ctx.createRadialGradient(64,64,0,64,64,64);
      grad.addColorStop(0,   cfg.glow + '0.5)');
      grad.addColorStop(0.4, cfg.glow + '0.15)');
      grad.addColorStop(1,   cfg.glow + '0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,128,128);
      const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(gc), transparent: true, depthWrite: false })
      );
      sprite.scale.set(5.8, 5.8, 1);

      const group = new THREE.Group();
      group.position.set(x, y, Z);
      group.add(new THREE.Mesh(sphereGeo, mat));
      group.add(sprite);

      // rings
      if (cfg.hasRing) {
        const ringGeo = new THREE.RingGeometry(2.5, 4.2, 128);
        // remap UVs so texture spreads radially
        const pos = ringGeo.attributes.position;
        const uv  = ringGeo.attributes.uv;
        const v3  = new THREE.Vector3();
        for (let j = 0; j < pos.count; j++) {
          v3.fromBufferAttribute(pos, j);
          const len = v3.length();
          uv.setXY(j, (len - 2.5) / (4.2 - 2.5), 0.5);
        }
        const ringMat = new THREE.MeshBasicMaterial({
          map: makeRingTexture(cfg.ringInner, cfg.ringOuter),
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.82,
          depthWrite: false
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = cfg.ringTilt.x;
        ring.rotation.z = cfg.ringTilt.z;
        group.add(ring);
      }

      scene.add(group);
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
